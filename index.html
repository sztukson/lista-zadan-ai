<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Zadań AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e;
    --cyan:#39d0c8; --green:#3fb950; --yellow:#d29922;
    --red:#f85149; --blue:#58a6ff; --purple:#bc8cff; --orange:#e67e22;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 36px 20px; font-size: 14px; }
  .container { max-width: 900px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--cyan); letter-spacing: -.02em; margin-bottom: 4px; }
  .header p  { font-size: 12px; color: var(--muted); }

  .overview { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; text-align: center; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono',monospace; margin-bottom: 3px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

  .main-progress { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 14px 16px; margin-bottom: 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .progress-label { font-size: 12px; font-weight: 600; }
  .progress-pct   { font-size: 17px; font-weight: 700; font-family: 'JetBrains Mono',monospace; color: var(--cyan); }
  .bar-track { height: 7px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg,var(--cyan),var(--green)); transition: width .5s cubic-bezier(.4,0,.2,1); }

  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 10px; flex-wrap: wrap; }
  .btn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; background: var(--surface2); color: var(--muted); }
  .btn:hover { color: var(--text); border-color: var(--cyan); }
  .btn-undo { color: var(--blue); }
  .btn-undo:hover { border-color: var(--blue); }
  .btn-week { color: var(--purple); }
  .btn-week:hover { border-color: var(--purple); color: var(--purple); }
  .btn-week.active { background: rgba(188,140,255,.1); border-color: var(--purple); color: var(--purple); }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; flex-shrink: 0; }
  .btn-filter {
    padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    background: var(--surface2); color: var(--muted); transition: all .15s;
  }
  .btn-filter:hover { color: var(--text); }
  .btn-filter.active { border-color: var(--cyan); color: var(--cyan); background: rgba(57,208,200,.1); }

  /* WEEK VIEW */
  .week-view {
    background: var(--surface); border: 1px solid rgba(188,140,255,.25);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
    display: none;
  }
  .week-view.open { display: block; }
  .week-view-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .week-view-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--purple); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-col { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; min-height: 50px; }
  .week-col-hd {
    padding: 5px 6px; font-size: 10px; font-weight: 700; text-align: center;
    text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .week-col-hd small { display: block; font-size: 9px; font-family: 'JetBrains Mono',monospace; font-weight: 400; opacity: .7; margin-top: 1px; }
  .week-col.wc-today .week-col-hd { background: rgba(230,126,34,.15); color: var(--orange); border-color: rgba(230,126,34,.3); }
  .week-col.wc-overdue .week-col-hd { background: rgba(248,81,73,.08); color: var(--red); }
  .week-col-body { padding: 4px; }
  .week-item {
    font-size: 10px; padding: 3px 5px; border-radius: 4px;
    margin-bottom: 2px; background: var(--bg);
    color: var(--text); line-height: 1.3; cursor: default;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-left: 2px solid transparent;
  }
  .week-item.wi-priority { border-left-color: var(--yellow); color: var(--yellow); }
  .week-item.wi-pawel    { border-left-color: var(--purple); }
  .week-no-items { font-size: 10px; color: var(--border); text-align: center; padding: 8px 0; }

  /* SECTION */
  .section { margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .section.drag-target > .sec-body { outline: 2px solid var(--cyan); outline-offset: -4px; border-radius: 8px; }

  .sec-header {
    display: flex; align-items: center; gap: 9px;
    padding: 11px 16px; cursor: pointer; user-select: none;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--text);
    transition: background .12s; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .sec-header:hover { background: #2d333b; }
  .section.collapsed .sec-header { border-bottom-color: transparent; }
  .sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sec-count { margin-left: auto; background: var(--surface2); padding: 1px 7px; border-radius: 10px; font-size: 10px; }
  .sec-chevron { font-size: 10px; transition: transform .2s; }
  .section.collapsed .sec-chevron { transform: rotate(-90deg); }

  .sec-body { padding: 8px; min-height: 10px; }
  .section.collapsed .sec-body { display: none; }

  /* QUADRANTS — vertical stack */
  .matrix { display: flex; flex-direction: column; gap: 8px; }

  .quadrant {
    border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .quadrant.drag-target { border-color: var(--cyan); background: rgba(57,208,200,.04); }
  .quadrant.q-collapsed .q-body { display: none; }
  .quadrant.q-collapsed .q-header { border-bottom-color: transparent; }

  .q-header {
    padding: 9px 13px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    display: flex; align-items: center; gap: 7px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: filter .12s;
  }
  .q-header:hover { filter: brightness(1.15); }
  .q-header .q-icon { font-size: 14px; }
  .q-header .q-count { margin-left: auto; font-size: 10px; opacity: .6; }
  .q-chevron { font-size: 10px; transition: transform .2s; }
  .quadrant.q-collapsed .q-chevron { transform: rotate(-90deg); }
  .q-desc { font-size: 9px; font-weight: 400; opacity: .65; margin-left: 2px; }
  .q-body { padding: 5px; min-height: 30px; }

  .q1 .q-header { background: rgba(248,81,73,.1);  color: var(--red);    }
  .q2 .q-header { background: rgba(210,153,34,.1); color: var(--yellow); }
  .q3 .q-header { background: rgba(230,126,34,.1); color: var(--orange); }
  .q4 .q-header { background: rgba(139,148,158,.1);color: var(--muted);  }

  /* DONE SUBSECTIONS */
  .done-sub { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; margin: 4px 0; }
  .done-sub.collapsed .done-sub-body { display: none; }
  .done-sub.collapsed .done-sub-hd { border-bottom-color: transparent; }
  .done-sub-hd {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    background: var(--bg); transition: background .12s;
  }
  .done-sub-hd:hover { background: var(--surface2); }
  .done-sub-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .done-sub-count { margin-left: auto; opacity: .55; font-size: 9px; }
  .done-sub-chevron { font-size: 9px; transition: transform .2s; margin-left: 4px; }
  .done-sub.collapsed .done-sub-chevron { transform: rotate(-90deg); }
  .done-sub-body { padding: 4px; }

  /* ITEM */
  .item {
    display: flex; align-items: flex-start; gap: 9px; flex-wrap: wrap;
    padding: 8px 9px; border-radius: 6px; margin-bottom: 2px;
    border: 1px solid transparent; transition: background .12s, border-color .12s;
    position: relative;
  }
  .item:hover { background: var(--surface2); }
  .item.drag-over-top    { border-top: 2px solid var(--cyan) !important; }
  .item.drag-over-bottom { border-bottom: 2px solid var(--cyan) !important; }
  .item.dragging         { opacity: .2; }
  .item.is-done .item-text { text-decoration: line-through; color: var(--muted); }
  .item.is-done .num       { opacity: .4; }
  .item.is-inprogress      { border-left: 3px solid rgba(230,126,34,.6); background: rgba(230,126,34,.04); }
  .item.is-inprogress .item-text { font-style: italic; }

  .num { font-size: 11px; font-weight: 700; color: var(--muted); font-family: 'JetBrains Mono',monospace; min-width: 18px; text-align: right; flex-shrink: 0; margin-top: 2px; }
  .drag-handle { color: var(--border); font-size: 11px; cursor: grab; flex-shrink: 0; margin-top: 2px; transition: color .12s; }
  .item:hover .drag-handle { color: var(--muted); }

  .cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all .15s; }
  .cb:hover { border-color: var(--cyan); background: rgba(57,208,200,.08); }
  .cb.checked { background: var(--green); border-color: var(--green); }
  .cb.checked::after { content: '✓'; font-size: 10px; color: #000; font-weight: 800; }
  .cb.inprogress { background: rgba(230,126,34,.2); border-color: var(--orange); }
  .cb.inprogress::after { content: '…'; font-size: 11px; color: var(--orange); font-weight: 800; line-height: 1; }

  .badge-cat {
    display: inline-flex; align-items: center;
    padding: 0 5px; border-radius: 4px;
    font-size: 9px; font-weight: 700; margin-left: 5px; vertical-align: middle;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .badge-cat.cat-prywatne { background: rgba(248,81,73,.15);   color: var(--red);    border: 1px solid rgba(248,81,73,.3);  }
  .badge-cat.cat-dp       { background: rgba(88,166,255,.15);  color: var(--blue);   border: 1px solid rgba(88,166,255,.3);  }
  .badge-cat.cat-vns      { background: rgba(230,126,34,.15); color: var(--orange); border: 1px solid rgba(230,126,34,.3); }

  .item-text { flex: 1; line-height: 1.45; font-size: 12px; min-width: 0; }

  /* DATE HIGHLIGHT */
  .date-tag {
    display: inline-block;
    background: rgba(210,153,34,.18); color: var(--yellow);
    border: 1px solid rgba(210,153,34,.35);
    padding: 0 5px; border-radius: 4px;
    font-size: 10px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    vertical-align: middle; margin: 0 2px;
  }
  .date-tag.today   { background: rgba(230,126,34,.22); color: var(--orange); border-color: rgba(230,126,34,.45); }
  .date-tag.overdue { background: rgba(248,81,73,.2);   color: var(--red);    border-color: rgba(248,81,73,.45); }

  .badge-p {
    display: inline-flex; align-items: center;
    background: rgba(188,140,255,.15); color: var(--purple);
    border: 1px solid rgba(188,140,255,.3);
    padding: 0 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700; margin-left: 6px; vertical-align: middle;
  }

  .completed-time {
    font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    margin-left: 7px; vertical-align: middle; opacity: .65;
  }

  /* PRIORITY / EDIT / DELETE / NOTE BUTTONS */
  .btn-priority {
    background: none; border: none; cursor: pointer; flex-shrink: 0;
    font-size: 15px; padding: 0 2px; line-height: 1;
    color: var(--border); transition: color .15s, transform .12s;
  }
  .btn-priority:hover               { color: var(--yellow); transform: scale(1.15); }
  .btn-priority.active              { color: var(--yellow); }
  .btn-priority.active:hover        { transform: scale(1.2); }
  .item.is-priority                 { border-left: 2px solid rgba(210,153,34,.5); }
  .item.is-priority .item-text      { font-weight: 500; }

  .btn-edit-item, .btn-delete-item, .btn-note-item, .btn-progress-item {
    display: none; background: none; border: none; cursor: pointer;
    font-size: 13px; padding: 0 3px; flex-shrink: 0;
    line-height: 1; transition: color .12s;
  }
  .btn-edit-item         { color: var(--border); margin-left: auto; }
  .btn-delete-item       { color: var(--border); }
  .btn-note-item         { color: var(--border); }
  .btn-progress-item     { color: var(--border); font-size: 12px; }
  .item:hover .btn-edit-item      { display: block; color: var(--muted); }
  .item:hover .btn-delete-item    { display: block; color: var(--muted); }
  .item:hover .btn-note-item      { display: block; color: var(--muted); }
  .item:hover .btn-progress-item  { display: block; color: var(--muted); }
  .btn-note-item.has-note         { display: block; color: var(--blue); }
  .btn-progress-item.is-active    { display: block; color: var(--orange); }
  .btn-edit-item:hover     { color: var(--cyan)   !important; }
  .btn-delete-item:hover   { color: var(--red)    !important; }
  .btn-note-item:hover     { color: var(--blue)   !important; }
  .btn-progress-item:hover { color: var(--orange) !important; }

  /* NOTE AREA */
  .note-row {
    flex-basis: 100%; width: 100%;
    display: flex; padding-left: 76px; padding-top: 4px;
  }
  .note-area {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 6px 9px; color: var(--muted);
    font-family: inherit; font-size: 11px; outline: none; resize: vertical;
    transition: border-color .15s; line-height: 1.5;
  }
  .note-area:focus { border-color: var(--blue); color: var(--text); }
  .note-area::placeholder { color: var(--border); }

  /* EXPORT/IMPORT */
  .io-row { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 12px; }
  .btn-io {
    padding: 5px 11px; border-radius: 7px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    background: var(--surface2); color: var(--muted); transition: all .15s;
  }
  .btn-io:hover { color: var(--text); border-color: var(--cyan); }
  #import-file { display: none; }

  .item.editing {
    background: rgba(57,208,200,.04);
    border: 1px solid var(--cyan) !important;
    border-radius: 8px; flex-wrap: wrap; gap: 0;
    padding: 10px 12px; align-items: flex-start;
  }
  .item-edit-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .item-edit-text {
    width: 100%; background: var(--surface2); border: 1px solid var(--cyan);
    border-radius: 6px; padding: 7px 10px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none; resize: none;
  }
  .item-edit-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .btn-save-edit {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--green);
    background: rgba(63,185,80,.12); color: var(--green); font-size: 11px;
    font-weight: 700; cursor: pointer; font-family: inherit; transition: background .12s;
  }
  .btn-save-edit:hover { background: rgba(63,185,80,.22); }
  .btn-cancel-edit {
    padding: 5px 9px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--muted); font-size: 11px;
    cursor: pointer; font-family: inherit; transition: background .12s;
  }
  .btn-cancel-edit:hover { background: var(--surface2); color: var(--text); }

  .empty-zone { padding: 10px; text-align: center; font-size: 11px; color: var(--border); border: 1.5px dashed var(--border); border-radius: 6px; margin: 3px; }
  .drag-target .empty-zone { border-color: var(--cyan); color: var(--cyan); }

  /* ADD FORM */
  .add-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
    display: none; flex-direction: column; gap: 10px;
  }
  .add-form.open { display: flex; }
  .add-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 12px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  .add-input:focus { border-color: var(--cyan); }
  .add-input::placeholder { color: var(--muted); }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .add-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 10px; color: var(--text);
    font-family: inherit; font-size: 12px; outline: none; cursor: pointer;
    transition: border-color .15s;
  }
  .add-select:focus { border-color: var(--cyan); }
  .add-date {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none;
    width: 150px; transition: border-color .15s; cursor: pointer;
    color-scheme: dark;
  }
  .add-date:focus { border-color: var(--yellow); }
  .add-date::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }
  .toggle-pawel {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); user-select: none; transition: all .15s;
  }
  .toggle-pawel.active { color: var(--purple); border-color: rgba(188,140,255,.4); background: rgba(188,140,255,.08); }
  .toggle-pawel input { display: none; }
  .btn-add {
    margin-left: auto; padding: 6px 16px; border-radius: 7px;
    border: 1px solid var(--cyan); font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit; background: rgba(57,208,200,.1);
    color: var(--cyan); transition: all .15s;
  }
  .btn-add:hover { background: rgba(57,208,200,.2); }
  .btn-add:active { transform: scale(.97); }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; opacity: 0; transform: translateY(6px); transition: all .22s; pointer-events: none; z-index: 999; }
  .toast.undo-toast { background: var(--blue); color: #fff; }
  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    body { padding: 10px 8px 80px; font-size: 13px; }

    /* TABS — przewijalne poziomo, nie zawijają */
    .proj-tabs {
      flex-wrap: nowrap; overflow-x: auto; gap: 3px; padding: 4px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .proj-tabs::-webkit-scrollbar { display: none; }
    .proj-tab { flex: 0 0 auto; font-size: 11px; padding: 8px 11px; white-space: nowrap; }

    /* HEADER */
    .header { margin-bottom: 18px; }
    .header h1 { font-size: 17px; }
    .header p  { font-size: 11px; }

    /* STATS — 2 kolumny */
    .overview { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-card { padding: 10px 8px; }
    .stat-value { font-size: 22px; }
    .stat-label { font-size: 9px; }

    /* PROGRESS */
    .main-progress { padding: 10px 12px; margin-bottom: 14px; }
    .progress-label { font-size: 11px; }
    .progress-pct   { font-size: 15px; }

    /* ACTIONS — 2 rzędy, mniejsze przyciski */
    .actions { gap: 4px; }
    .btn { font-size: 10px; padding: 6px 10px; }

    /* FILTRY */
    .filter-bar { gap: 4px; margin-bottom: 8px; }
    .filter-label { font-size: 9px; }
    .btn-filter { font-size: 10px; padding: 4px 10px; }

    /* WEEK VIEW — poziomy scroll */
    .week-view { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .week-grid { grid-template-columns: repeat(7, minmax(80px, 1fr)); min-width: 560px; }
    .week-col-hd { font-size: 9px; padding: 4px; }
    .week-item  { font-size: 9px; }

    /* SEKCJE */
    .sec-header { font-size: 11px; padding: 10px 12px; }
    .sec-count  { font-size: 9px; }
    .sec-body   { padding: 5px; }

    /* QUADRANTY */

// ════════════════════════════════════════
//  SUPABASE
// ════════════════════════════════════════
const SUPABASE_URL = 'https://xvewgjnxtipvqyqswjia.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2ZXdnam54dGlwdnF5cXN3amlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NzQ3MDgsImV4cCI6MjA5NjU1MDcwOH0.XnQnxZcevO_JojRy3mb-r6zdo_2LR9x2AneMdNHbGuw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function itemToRow(item, proj) {
  return {
    id: item.id, project: proj,
    sec: item.sec, quad: item.quad || null, text: item.text,
    checked: item.checked || false, in_progress: item.inProgress || false,
    priority: item.priority || false, pawel: item.pawel || false,
    cat: item.cat || null, note: item.note || '',
    completed_at: item.completedAt || null,
    prev_sec: item._prevSec || null, prev_quad: item._prevQuad || null,
  };
}

function rowToItem(row) {
  return {
    id: row.id, sec: row.sec, quad: row.quad, text: row.text,
    checked: row.checked, inProgress: row.in_progress,
    priority: row.priority, pawel: row.pawel,
    cat: row.cat, note: row.note || '',
    completedAt: row.completed_at,
    _prevSec: row.prev_sec, _prevQuad: row.prev_quad,
  };
}

async function sbFetch(projectKey) {
  try {
    const { data, error } = await sb.from('tasks').select('*').eq('project', projectKey);
    if (error) throw error;
    return data.map(rowToItem);
  } catch(e) { console.warn('sbFetch', e); return null; }
}

async function sbSave(projectItems, projectKey) {
  if (!projectItems.length) return;
  try {
    await sb.from('tasks').upsert(projectItems.map(i => itemToRow(i, projectKey)), { onConflict: 'id' });
  } catch(e) { console.warn('sbSave', e); }
}

async function sbDelete(id) {
  try { await sb.from('tasks').delete().eq('id', id); } catch(e) {}
}

async function syncFromSupabase() {
  try {
    if (activeProject === 'general') {
      const results = await Promise.all(CAT_PROJECTS.map(k => sbFetch(k)));
      const merged = [];
      CAT_PROJECTS.forEach((catKey, i) => {
        const src = results[i] || loadCatItems(catKey);
        src.forEach(item => { if (!item.cat) item.cat = catKey; merged.push(item); });
      });
      items = merged;
    } else if (activeProject !== 'projekty') {
      const remote = await sbFetch(activeProject);
      if (remote && remote.length) items = remote;
    } else return;
    render();
    const sbEl = document.getElementById('sb-status');
    if (sbEl) sbEl.innerHTML = '<span style="color:var(--green)">☁ online</span>';
  } catch(e) {
    const sbEl = document.getElementById('sb-status');
    if (sbEl) sbEl.innerHTML = '<span style="color:var(--red)">☁ offline</span>';
  }
}

function loadCatItems(catKey) {
  const proj = PROJECTS[catKey];
  let catItems = JSON.parse(JSON.stringify(proj.defaultItems));
  try {
    const raw = localStorage.getItem(proj.storageKey);
    if (raw) { const s = JSON.parse(raw); if (s.items) catItems = s.items; }
  } catch(e) {}
  catItems.forEach(i => {
    if (!i.cat)        i.cat        = catKey;
    if (!i.inProgress) i.inProgress = false;
    if (!i.note)       i.note       = '';
    if (i.priority === undefined) i.priority = false;
  });
  return catItems;
}

function loadAggregateItems() {
  return CAT_PROJECTS.flatMap(k => loadCatItems(k));
}

function saveAggregateItems() {
  CAT_PROJECTS.forEach(catKey => {
    const catItems = items.filter(i => i.cat === catKey);
    if (!catItems.length && !localStorage.getItem(PROJECTS[catKey].storageKey)) return;
    const state = { _saved: new Date().toISOString(), items: catItems };
    localStorage.setItem(PROJECTS[catKey].storageKey, JSON.stringify(state));
  });
}

// ════════════════════════════════════════
//  UNDO HISTORY (trwałe — przeżywa F5)
// ════════════════════════════════════════
const MAX_HISTORY = 50;
let undoStack = [];

function undoKey() { return PROJECTS[activeProject].storageKey + '-undo'; }
function logKey()  { return PROJECTS[activeProject].storageKey + '-log'; }

function saveUndoStack() {
  try { localStorage.setItem(undoKey(), JSON.stringify(undoStack)); } catch(e) {}
}
function loadUndoStack() {
  try { const r = localStorage.getItem(undoKey()); if (r) undoStack = JSON.parse(r); }
  catch(e) { undoStack = []; }
}

function snapshot() {
  return JSON.stringify({
    items: JSON.parse(JSON.stringify(items)),
    secs:  sections.map(s => ({ id: s.id, collapsed: s.collapsed })),
    qc:    { ...QUADS_COLLAPSED },
    dc:    { ...DONE_SUBS_COLLAPSED },
  });
}

function pushHistory() {
  undoStack.push(snapshot());
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  saveUndoStack();
}

function undo() {
  if (!undoStack.length) return;
  const state = JSON.parse(undoStack.pop());
  items = state.items;
  state.secs.forEach(ss => { const s = sections.find(x => x.id === ss.id); if (s) s.collapsed = ss.collapsed; });
  Object.assign(QUADS_COLLAPSED, state.qc);
  Object.assign(DONE_SUBS_COLLAPSED, state.dc);
  saveUndoStack();
  render();
  showToast('↩ Cofnięto', true);
  logAction('↩', 'Cofnięto akcję');
}

document.addEventListener('keydown', e => {
  const inField = e.target.matches('input,textarea,select');
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();

    closeEdit();

    e.preventDefault();
    const form = document.getElementById('add-form');
    if (!form.classList.contains('open')) toggleAddForm();

  }
});

// ════════════════════════════════════════
//  DATE UTILS
// ════════════════════════════════════════
const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
function todayISO() { return TODAY.toISOString().slice(0,10); }

function pickerToDisplay(isoDate) {
  if (!isoDate) return '';
  const [yr, mo, d] = isoDate.split('-');
  return +yr === TODAY.getFullYear() ? `${d}.${mo}` : `${d}.${mo}.${yr}`;
}

function parseDate(str) {
  const m = str.match(/^(\d{1,2})[.\/-](\d{2})(?:[.\/-](\d{2,4}))?$/);
  if (!m) return null;
  let yr = m[3] ? (m[3].length === 2 ? 2000 + +m[3] : +m[3]) : TODAY.getFullYear();
  const dt = new Date(yr, +m[2] - 1, +m[1]);
  dt.setHours(0, 0, 0, 0);
  return dt;
}

const DAY_SHORT = ['niedz', 'pon', 'wt', 'śr', 'czw', 'pt', 'sob'];

function highlightDates(text) {
  return escHtml(text).replace(
    /\d{1,2}[.\/-]\d{2}(?:[.\/-]\d{2,4})?|\d{1,2}:\d{2}/g,
    match => {
      const dt = parseDate(match);
      let cls = 'date-tag';
      let label = match;
      if (dt) {
        const diffDays = Math.round((dt - TODAY) / 86400000);
        if      (dt < TODAY)                       cls += ' overdue';
        else if (dt.getTime() === TODAY.getTime()) cls += ' today';
        const dayName = DAY_SHORT[dt.getDay()];
        let counter = '';
        if      (diffDays === 0)  counter = ' dziś';
        else if (diffDays > 0)    counter = ` za ${diffDays}d`;
        else                      counter = ` ${Math.abs(diffDays)}d temu`;
        label = `${match} ${dayName}${counter}`;
      }
      return `<span class="${cls}">${label}</span>`;
    }
  );
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTs(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2,'0');
  const mon = String(d.getMonth()+1).padStart(2,'0');
  const h   = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${day}.${mon} ${h}:${min}`;
}

function getItemDate(item) {
  const m = item.text.match(/\d{1,2}[.\/-]\d{2}(?:[.\/-]\d{2,4})?/);
  return m ? parseDate(m[0]) : null;
}

function setFilter(f) {
  activeFilter = f;
  ['all','priority','pawel','today','inprogress','prywatne','firmowe','dop','projekty'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.classList.toggle('active', k === f);
  });
  render();
}

function applyFilter(list) {
  if (activeFilter === 'all')        return list;
  if (activeFilter === 'priority')   return list.filter(i => i.priority);
  if (activeFilter === 'pawel')      return list.filter(i => i.pawel);
  if (activeFilter === 'inprogress') return list.filter(i => i.inProgress);
  if (activeFilter === 'prywatne')   return list.filter(i => i.cat === 'prywatne');
  if (activeFilter === 'firmowe')    return list.filter(i => i.cat === 'firmowe');
  if (activeFilter === 'dop')        return list.filter(i => i.cat === 'dop');
  if (activeFilter === 'projekty')   return list.filter(i => i.cat === 'projekty');
  if (activeFilter === 'today') {
    return list.filter(i => {
      const dt = getItemDate(i);
      return dt && dt.getTime() === TODAY.getTime();
    });
  }
  return list;
}

function toggleWeekView() {
  weekViewOpen = !weekViewOpen;
  document.getElementById('btn-week').classList.toggle('active', weekViewOpen);
  render();
}

function renderWeekView() {
  const card = document.getElementById('week-view-card');
  if (!weekViewOpen) { card.className = 'week-view'; card.innerHTML = ''; return; }
  card.className = 'week-view open';

  const dow = TODAY.getDay();
  const monday = new Date(TODAY);
  monday.setDate(TODAY.getDate() - (dow === 0 ? 6 : dow - 1));

  const days = Array.from({length:7}, (_, i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i); return d;
  });

  const fmt = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
  const DAY_NAMES = ['Pon','Wt','Śr','Czw','Pt','Sob','Niedz'];

  card.innerHTML = `
    <div class="week-view-hd">
      <span class="week-view-title">📅 Tydzień ${fmt(monday)} – ${fmt(days[6])}</span>
    </div>
    <div class="week-grid" id="week-grid"></div>
  `;

  const grid = card.querySelector('#week-grid');
  days.forEach((day, i) => {
    const isToday   = day.getTime() === TODAY.getTime();
    const isOverdue = day < TODAY;
    const dayItems  = items.filter(it => {
      if (it.checked || it.sec !== 'todo') return false;
      const dt = getItemDate(it);
      return dt && dt.getTime() === day.getTime();
    });

    const col = document.createElement('div');
    col.className = 'week-col' + (isToday ? ' wc-today' : isOverdue ? ' wc-overdue' : '');
    col.innerHTML = `
      <div class="week-col-hd">${DAY_NAMES[i]}<small>${fmt(day)}</small></div>
      <div class="week-col-body">
        ${dayItems.length === 0
          ? '<div class="week-no-items">—</div>'
          : dayItems.map(it => `<div class="week-item ${it.priority?'wi-priority':''} ${it.pawel?'wi-pawel':''}" title="${escHtml(it.text)}">${escHtml(it.text.replace(/\s*[—–-]\s*\d{1,2}[.\/-]\d{2}.*$/,'').trim())}</div>`).join('')}
      </div>
    `;
    grid.appendChild(col);
  });
}

// ════════════════════════════════════════
//  PROJECTS VIEW
// ════════════════════════════════════════
function renderProjectsView() {
  renderWeekView();
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'proj-grid';

  let totalAll = 0, doneAll = 0;

  Object.entries(SUB_PROJECTS).forEach(([key, meta]) => {
    let projectItems = [];
    try {
      const raw = localStorage.getItem(PROJECTS[key] && PROJECTS[key].storageKey);
      const data = raw ? JSON.parse(raw) : null;
      projectItems = data && data.items ? data.items : (PROJECTS[key] ? PROJECTS[key].defaultItems : []);
    } catch(e) { projectItems = PROJECTS[key] ? PROJECTS[key].defaultItems : []; }

    const count = projectItems.filter(i => !i.checked).length;
    const done  = projectItems.filter(i => i.checked).length;
    totalAll += projectItems.length;
    doneAll  += done;

    const card = document.createElement('div');
    card.className = 'proj-card';
    card.innerHTML = `
      <div class="proj-card-icon">${meta.icon}</div>
      <div class="proj-card-title">${meta.label}</div>
      <div class="proj-card-desc">${meta.desc}</div>
      <div class="proj-card-count">${count} zadań do zrobienia</div>
    `;
    card.onclick = () => openSubProject(key);
    grid.appendChild(card);
  });

  wrap.appendChild(grid);

  // update stats & progress bar with aggregate data
  const pct = totalAll > 0 ? Math.round(doneAll / totalAll * 100) : 0;
  const s_done = document.getElementById('s-done');
  const s_pct  = document.getElementById('pct');
  const s_bar  = document.getElementById('bar');
  if (s_done) s_done.textContent = doneAll;
  if (s_pct)  s_pct.textContent  = pct + '%';
  if (s_bar)  s_bar.style.width  = pct + '%';

  const s_q1 = document.getElementById('s-q1');
  const s_q2 = document.getElementById('s-q2');
  const s_ip = document.getElementById('s-inprogress');
  if (s_q1) s_q1.textContent = totalAll - doneAll;
  if (s_q2) s_q2.textContent = 0;
  if (s_ip) s_ip.textContent = 0;
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render() {
  if (activeProject === 'projekty') {
    renderProjectsView();
    return;
  }

  renderWeekView();

  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';

  // Back button when inside a sub-project
  if (projectsSubView) {
    const back = document.createElement('button');
    back.className = 'btn proj-back';
    back.innerHTML = '← Projekty';
    back.style.color = 'var(--purple)';
    back.onclick = () => switchProject('projekty');
    wrap.appendChild(back);
  }

  sections.forEach(sec => {
    const secItems = items.filter(i => i.sec === sec.id);
    const div = document.createElement('div');
    div.className = 'section' + (sec.collapsed ? ' collapsed' : '');
    div.id = 'sec-' + sec.id;

    const countLabel = sec.id === 'done'
      ? secItems.length
      : secItems.filter(i => !i.checked).length;

    div.innerHTML = `
      <div class="sec-header" onclick="toggleSection('${sec.id}',event)">
        <div class="sec-dot" style="background:${sec.color}"></div>
        ${sec.label}
        <span class="sec-count">${countLabel}</span>
        <span class="sec-chevron">▼</span>
      </div>
      <div class="sec-body" id="body-${sec.id}"></div>
    `;
    wrap.appendChild(div);

    if (!sec.collapsed) {
      const body = div.querySelector('.sec-body');
      if      (sec.id === 'todo') renderMatrix(body);
      else if (sec.id === 'done') renderDone(body);
      else                        renderFlatList(body, sec, secItems);
    }
  });

  updateStats();
}

// ── Quadrant toggle ──
function toggleQuad(qId) {
  pushHistory();
  QUADS_COLLAPSED[qId] = !QUADS_COLLAPSED[qId];
  render(); autoSave();
}

// ── Matrix ──
function renderMatrix(body) {
  const grid = document.createElement('div');
  grid.className = 'matrix';

  QUADS.forEach(q => {
    const raw = items.filter(i => i.sec === 'todo' && i.quad === q.id && !i.checked);
    const filtered = applyFilter(raw).sort((a, b) => (b.priority ? 1 : 0) - (a.priority ? 1 : 0));
    const collapsed = QUADS_COLLAPSED[q.id];

    const qEl = document.createElement('div');
    qEl.className = `quadrant ${q.cls}${collapsed ? ' q-collapsed' : ''}`;
    qEl.id = 'quad-' + q.id;

    const displayCount = activeFilter === 'all' ? raw.filter(i => !i.checked).length : filtered.length;

    qEl.innerHTML = `
      <div class="q-header" onclick="event.stopPropagation();toggleQuad('${q.id}')">
        <span class="q-icon">${q.icon}</span>
        ${q.label}
        <span class="q-desc">${q.desc}</span>
        <span class="q-count">${displayCount}</span>
        <span class="q-chevron">▼</span>
      </div>
      <div class="q-body" id="qbody-${q.id}"></div>
    `;
    grid.appendChild(qEl);

    if (!collapsed) {
      const qBody = qEl.querySelector('.q-body');
      if (filtered.length === 0) {
        qBody.innerHTML = `<div class="empty-zone">${activeFilter !== 'all' ? 'Brak dla wybranego filtru' : 'Przeciągnij tutaj'}</div>`;
      } else {
        filtered.forEach((item, idx) => qBody.appendChild(makeItem(item, idx+1)));
      }
      if (activeFilter === 'all') setupDropZone(qBody, 'todo', q.id, qEl);
    }
  });

  body.appendChild(grid);
}

// ── Flat list ──
function renderFlatList(body, sec, secItems) {
  const filtered = applyFilter(secItems).sort((a, b) => (b.priority ? 1 : 0) - (a.priority ? 1 : 0));
  if (filtered.length === 0) {
    body.innerHTML = `<div class="empty-zone">${activeFilter !== 'all' ? 'Brak dla wybranego filtru' : 'Przeciągnij tutaj'}</div>`;
  } else {
    filtered.forEach((item, idx) => body.appendChild(makeItem(item, idx+1)));
  }
  if (activeFilter === 'all') setupDropZone(body, sec.id, null, document.getElementById('sec-'+sec.id));
}

// ── Done section with subsections ──
function renderDone(body) {
  const allDone = items.filter(i => i.checked);
  if (allDone.length === 0) {
    body.innerHTML = `<div class="empty-zone">Nic tu jeszcze nie trafiło</div>`;
    return;
  }

  DONE_SUBS.forEach(def => {
    const subItems = allDone.filter(i =>
      def.from === 'todo'
        ? (!i._prevSec || i._prevSec === 'todo')
        : i._prevSec === def.from
    );
    if (subItems.length === 0) return;

    const sorted = [...subItems].sort((a, b) => {
      if (!a.completedAt && !b.completedAt) return 0;
      if (!a.completedAt) return 1;
      if (!b.completedAt) return -1;
      return new Date(b.completedAt) - new Date(a.completedAt);
    });

    const collapsed = DONE_SUBS_COLLAPSED[def.id] ?? false;
    const subEl = document.createElement('div');
    subEl.className = 'done-sub' + (collapsed ? ' collapsed' : '');

    subEl.innerHTML = `
      <div class="done-sub-hd" onclick="event.stopPropagation();toggleDoneSub('${def.id}')">
        <div class="done-sub-dot" style="background:${def.color}"></div>
        ${def.label}
        <span class="done-sub-count">${sorted.length}</span>
        <span class="done-sub-chevron">▼</span>
      </div>
      <div class="done-sub-body"></div>
    `;
    body.appendChild(subEl);

    if (!collapsed) {
      const sb = subEl.querySelector('.done-sub-body');
      sorted.forEach((item, idx) => {
        const el = makeItem(item, idx+1);
        const ts = fmtTs(item.completedAt);
        if (ts) {
          const span = document.createElement('span');
          span.className = 'completed-time';
          span.textContent = ts;
          el.querySelector('.item-text').appendChild(span);
        }
        sb.appendChild(el);
      });
    }
  });
}

function toggleDoneSub(id) {
  pushHistory();
  DONE_SUBS_COLLAPSED[id] = !DONE_SUBS_COLLAPSED[id];
  render(); autoSave();
}

// ── Drop zone setup ──
function setupDropZone(el, secId, quadId, highlightEl) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    highlightEl.classList.add('drag-target');
  });
  el.addEventListener('dragleave', e => {
    if (!highlightEl.contains(e.relatedTarget)) highlightEl.classList.remove('drag-target');
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    highlightEl.classList.remove('drag-target');
    if (!dragState.id) return;
    const overItem = e.target.closest('.item');
    if (!overItem) moveItem(dragState.id, secId, quadId, null, false);
  });
}

// ── Make item element ──
function makeItem(item, num) {
  const el = document.createElement('div');
  el.dataset.id = item.id;

  // ── EDIT MODE ──
  if (editingId === item.id) {
    el.className = 'item editing';
    const curSec  = item.sec === 'done' ? (item._prevSec || 'todo') : item.sec;
    const curQuad = item.quad || 'q2';
    const quadVis = curSec === 'todo' ? '' : 'display:none';

    el.innerHTML = `
      <span class="num">${num}.</span>
      <div class="item-edit-wrap">
        <textarea class="item-edit-text" id="eit-${item.id}" rows="2">${escHtml(item.text)}</textarea>
        <div class="item-edit-row">
          <select class="add-select" id="eis-${item.id}" onchange="onEditSecChange('${item.id}')">
            <option value="todo"  ${curSec==='todo'  ?'selected':''}>📋 Do Zrobienia</option>
            <option value="ai"    ${curSec==='ai'    ?'selected':''}>🤖 Pytania do AI</option>
            <option value="pawel" ${curSec==='pawel' ?'selected':''}>👤 Pytania do Pawła</option>
          </select>
          <select class="add-select" id="eiq-${item.id}" style="${quadVis}">
            <option value="q1" ${curQuad==='q1'?'selected':''}>🔴 Pilne + Ważne</option>
            <option value="q2" ${curQuad==='q2'?'selected':''}>🟡 Ważne + Niepilne</option>
            <option value="q3" ${curQuad==='q3'?'selected':''}>🟠 Pilne + Nieważne</option>
            <option value="q4" ${curQuad==='q4'?'selected':''}>⚪ Niepilne + Nieważne</option>
          </select>
          <input class="add-date" id="eid-${item.id}" type="date" title="Dołącz datę do tekstu">
          <label class="toggle-pawel ${item.pawel?'active':''}" id="eip-${item.id}" onclick="toggleEditPawel('${item.id}')">
            <input type="checkbox" ${item.pawel?'checked':''}> [P] Paweł
          </label>
          <button class="btn-mic" id="emic-${item.id}" onclick="event.stopPropagation();toggleEditMic('${item.id}')" title="Dyktuj">🎤</button>
          <button class="btn-save-edit"   onclick="event.stopPropagation();saveEdit('${item.id}')">✓ Zapisz</button>
          <button class="btn-cancel-edit" onclick="event.stopPropagation();closeEdit()">✕ Anuluj</button>
        </div>
      </div>
    `;

    const ta = el.querySelector('.item-edit-text');
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(item.id); }
      if (e.key === 'Escape') closeEdit();
    });
    return el;
  }

  // ── NORMAL MODE ──
  const noteOpen = openNotes.has(item.id);
  const hasNote  = !!(item.note && item.note.trim());

  const catLabels = { prywatne:'Prywatne', dp:'DOP', vns:'VNS' };
  el.className = 'item'
    + (item.checked    ? ' is-done'       : '')
    + (item.inProgress ? ' is-inprogress' : '')
    + (item.priority   ? ' is-priority'   : '')
    + (selectedIds.has(item.id) ? ' selected' : '');
  el.draggable = true;

  const cbCls = item.checked ? 'checked' : (item.inProgress ? 'inprogress' : '');
  el.innerHTML = `
    <div class="sel-cb" onclick="event.stopPropagation();toggleSelect('${item.id}')" title="Zaznacz"></div>
    <span class="num">${num}.</span>
    <span class="drag-handle">⋮⋮</span>
    <button class="btn-priority ${item.priority?'active':''}"
            onclick="event.stopPropagation();togglePriority('${item.id}')"
            title="${item.priority?'Usuń priorytet':'Ustaw priorytet'}">★</button>
    <div class="cb ${cbCls}" data-cbid="${item.id}" title="Kliknij: ☐→W trakcie→✓"></div>
    <div class="item-text" ondblclick="event.stopPropagation();openEdit('${item.id}')">
      ${highlightDates(item.text)}
      ${item.pawel ? '<span class="badge-p">[P]</span>' : ''}
      ${item.cat   ? `<span class="badge-cat cat-${item.cat}">${catLabels[item.cat]||item.cat}</span>` : ''}
    </div>
    <button class="btn-progress-item ${item.inProgress?'is-active':''}" onclick="event.stopPropagation();toggleInProgress('${item.id}')" title="${item.inProgress?'Usuń W trakcie':'Oznacz jako W trakcie'}">⏳</button>
    <button class="btn-note-item ${hasNote?'has-note':''}" onclick="event.stopPropagation();toggleNote('${item.id}')" title="${noteOpen?'Schowaj notatkę':'Pokaż notatkę'}">📝</button>
    <button class="btn-edit-item"   onclick="event.stopPropagation();openEdit('${item.id}')"   title="Edytuj">✏</button>
    <button class="btn-delete-item" onclick="event.stopPropagation();deleteItem('${item.id}')" title="Usuń">✕</button>
  `;

  // Note area row
  if (noteOpen) {
    const noteRow = document.createElement('div');
    noteRow.className = 'note-row';
    const ta = document.createElement('textarea');
    ta.className = 'note-area';
    ta.placeholder = 'Notatka do zadania…';
    ta.value = item.note || '';
    ta.rows = 2;
    ta.addEventListener('input', e => {
      item.note = e.target.value;
      // update btn-note indicator without full re-render
      const btn = el.querySelector('.btn-note-item');
      if (btn) btn.classList.toggle('has-note', !!(e.target.value.trim()));
      autoSave();
    });
    ta.addEventListener('click', e => e.stopPropagation());
    ta.addEventListener('keydown', e => {
      if (e.key === 'Escape') { openNotes.delete(item.id); render(); }
    });
    noteRow.appendChild(ta);
    el.appendChild(noteRow);
    setTimeout(() => ta.focus(), 20);
  }

  el.querySelector('.cb').addEventListener('click', e => {
    e.stopPropagation();
    toggleCheck(item.id);
  });

  el.addEventListener('dragstart', e => {
    dragState.id = item.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', item.id);
    setTimeout(() => el.classList.add('dragging'), 0);
  });

  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x => x.classList.remove('drag-over-top','drag-over-bottom'));
    document.querySelectorAll('.drag-target').forEach(x => x.classList.remove('drag-target'));
    dragState.id = null;
  });

  el.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dragState.id || dragState.id === item.id) return;
    const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x => x.classList.remove('drag-over-top','drag-over-bottom'));
    el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
  });

  el.addEventListener('dragleave', e => {
    if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over-top','drag-over-bottom');
  });

  el.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    el.classList.remove('drag-over-top','drag-over-bottom');
    if (!dragState.id || dragState.id === item.id) return;
    const after = e.clientY >= el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
    const secEl = el.closest('.section');
    const secId = secEl ? secEl.id.replace('sec-','') : item.sec;
    const qEl   = el.closest('.quadrant');
    const qId   = qEl ? qEl.id.replace('quad-','') : null;
    moveItem(dragState.id, secId, qId, item.id, after);
  });

  return el;
}

// ════════════════════════════════════════
//  NOTE
// ════════════════════════════════════════
function toggleNote(id) {
  if (openNotes.has(id)) openNotes.delete(id);
  else openNotes.add(id);
  render();
}

// ════════════════════════════════════════
//  EDIT ACTIONS
// ════════════════════════════════════════
function deleteItem(id) {
  const item = items.find(i => i.id === id);
  pushHistory();
  openNotes.delete(id);
  items = items.filter(i => i.id !== id);
  render(); autoSave();
  sbDelete(id);
  if (item) logAction('✕', `Usunięto: ${item.text.slice(0,55)}`);
  showToast('✕ Usunięto — Ctrl+Z cofa', true);
}

function exportJSON() {
  const state = {
    _exported: new Date().toISOString(),
    items,
    sections: sections.map(s => ({ id: s.id, collapsed: s.collapsed })),
    quadsCollapsed:    { ...QUADS_COLLAPSED },
    doneSubsCollapsed: { ...DONE_SUBS_COLLAPSED },
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `ai_lista_${new Date().toISOString().slice(0,10)}.json` });
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      pushHistory();
      const state = JSON.parse(e.target.result);
      if (state.items) items = state.items;
      if (state.sections) state.sections.forEach(ss => {
        const s = sections.find(x => x.id === ss.id);
        if (s) s.collapsed = ss.collapsed;
      });
      if (state.quadsCollapsed)    Object.assign(QUADS_COLLAPSED, state.quadsCollapsed);
      if (state.doneSubsCollapsed) Object.assign(DONE_SUBS_COLLAPSED, state.doneSubsCollapsed);
      items.forEach(i => {
        if (i.priority === undefined) i.priority = false;
        if (i.note === undefined) i.note = '';
      });
      render(); autoSave();
      showToast('⬆ Zaimportowano', false);
    } catch { showToast('Błąd pliku JSON', true); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function togglePriority(id) {
  pushHistory();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.priority = !item.priority;
  render(); autoSave();
}

function toggleInProgress(id) {
  pushHistory();
  const item = items.find(i => i.id === id);
  if (!item || item.checked) return;
  item.inProgress = !item.inProgress;
  logAction('⏳', `${item.inProgress ? 'W trakcie' : 'Wróć'}: ${item.text.slice(0,55)}`);
  render(); autoSave();
}

function openEdit(id) {
  editingId = id;
  render();
  setTimeout(() => {
    const ta = document.getElementById('eit-' + id);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 30);
}

function closeEdit() {
  editingId = null;
  render();
}

function onEditSecChange(id) {
  const sec  = document.getElementById('eis-' + id);
  const quad = document.getElementById('eiq-' + id);
  if (sec && quad) quad.style.display = sec.value === 'todo' ? '' : 'none';
}

function toggleEditPawel(id) {
  const lbl = document.getElementById('eip-' + id);
  const cb  = lbl && lbl.querySelector('input');
  if (!cb) return;
  cb.checked = !cb.checked;
  lbl.classList.toggle('active', cb.checked);
}

function saveEdit(id) {
  const ta    = document.getElementById('eit-' + id);
  const secEl = document.getElementById('eis-' + id);
  const qEl   = document.getElementById('eiq-' + id);
  const pEl   = document.getElementById('eip-' + id);
  if (!ta) return;

  const newText = ta.value.trim();
  if (!newText) { ta.focus(); return; }

  const dateEl  = document.getElementById('eid-' + id);
  const dateStr = dateEl ? pickerToDisplay(dateEl.value) : '';

  pushHistory();
  const item = items.find(i => i.id === id);
  if (!item) return;

  item.text  = dateStr ? `${newText} — ${dateStr}` : newText;
  item.pawel = pEl ? pEl.querySelector('input').checked : item.pawel;

  if (secEl) {
    const newSec  = secEl.value;
    const newQuad = qEl ? qEl.value : null;
    if (item.sec !== 'done') {
      item.sec  = newSec;
      item.quad = newSec === 'todo' ? (newQuad || 'q2') : null;
    }
  }

  editingId = null;
  render(); autoSave();
  showToast('✓ Zapisano', false);
}

// ════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════
function toggleCheck(id) {
  pushHistory();
  const item = items.find(i => i.id === id);
  if (!item) return;

  if (item.checked) {
    // done → todo
    item.checked    = false;
    item.inProgress = false;
    if (item.sec === 'done') {
      item.sec  = item._prevSec  || 'todo';
      item.quad = item._prevQuad || 'q2';
      delete item._prevSec; delete item._prevQuad; delete item.completedAt;
    }
    logAction('↺', `Przywrócono: ${item.text.slice(0,55)}`);
  } else if (item.inProgress) {
    // w trakcie → done
    item.inProgress  = false;
    item.checked     = true;
    item._prevSec    = item.sec;
    item._prevQuad   = item.quad;
    item.completedAt = new Date().toISOString();
    item.sec  = 'done';
    item.quad = null;
    sections.find(s => s.id === 'done').collapsed = false;
    logAction('✓', `Zrobione: ${item.text.slice(0,55)}`);
  } else {
    // todo → w trakcie
    item.inProgress = true;
    logAction('…', `W trakcie: ${item.text.slice(0,55)}`);
  }
  render(); autoSave();
}

function moveItem(srcId, targetSec, targetQuad, anchorId, insertAfter) {
  pushHistory();
  const srcIdx = items.findIndex(i => i.id === srcId);
  if (srcIdx < 0) return;
  const [item] = items.splice(srcIdx, 1);

  item.sec  = targetSec;
  item.quad = targetSec === 'todo' ? (targetQuad || 'q2') : null;

  if (item.checked && targetSec !== 'done') { item.checked = false; delete item.completedAt; }
  if (!item.checked && targetSec === 'done') { item.checked = true; item.completedAt = item.completedAt || new Date().toISOString(); }

  if (!anchorId) {
    let insertAt = items.length;
    for (let i = items.length - 1; i >= 0; i--) {
      if (items[i].sec === targetSec && (targetSec !== 'todo' || items[i].quad === item.quad)) {
        insertAt = i + 1; break;
      }
    }
    if (insertAt === items.length) {
      for (let i = items.length - 1; i >= 0; i--) {
        if (items[i].sec === targetSec) { insertAt = i + 1; break; }
      }
    }
    items.splice(insertAt, 0, item);
  } else {
    const anIdx = items.findIndex(i => i.id === anchorId);
    items.splice(insertAfter ? anIdx + 1 : anIdx, 0, item);
  }
  render(); autoSave();
}

function toggleSection(id, event) {
  if (event && event.target && event.target.closest('.sec-body')) return;
  const s = sections.find(x => x.id === id);
  if (s) s.collapsed = !s.collapsed;
  render(); autoSave();
}

function toggleAll() {
  pushHistory();
  const anyOpen = sections.some(s => !s.collapsed);
  sections.forEach(s => s.collapsed = anyOpen);
  render(); autoSave();
}

function resetChecked() {
  if (!confirm('Odznaczyć wszystkie zaznaczenia?')) return;
  pushHistory();
  items.forEach(item => {
    if (['d1','d2','d3','d4','d5','d6','d7'].includes(item.id)) return;
    if (item.checked) {
      item.checked = false;
      item.sec  = item._prevSec  || 'todo';
      item.quad = item._prevQuad || 'q2';
      delete item._prevSec; delete item._prevQuad; delete item.completedAt;
    }
  });
  render(); autoSave();
}

function saveState(silent = false) {
  if (activeProject === 'projekty') return;
  if (activeProject === 'general') {
    saveAggregateItems();
  } else {
    const state = {
      _saved: new Date().toISOString(),
      items,
      sections: sections.map(s => ({ id: s.id, collapsed: s.collapsed })),
      quadsCollapsed:    { ...QUADS_COLLAPSED },
      doneSubsCollapsed: { ...DONE_SUBS_COLLAPSED },
    };
    localStorage.setItem(PROJECTS[activeProject].storageKey, JSON.stringify(state));
  }
  document.getElementById('last-saved').textContent = `Zapis: ${new Date().toLocaleString('pl-PL')}`;
  if (!silent) showToast('✓ Zapisano', false);
}

let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveState(true);
    if (activeProject === 'general') {
      CAT_PROJECTS.forEach(catKey => sbSave(items.filter(i => i.cat === catKey), catKey));
    } else if (activeProject !== 'projekty') {
      sbSave(items, activeProject);
    }
  }, 700);
}

function loadState() {
  try {
    const raw = localStorage.getItem(PROJECTS[activeProject].storageKey);
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.items) {
      items = state.items;
      // merge new DEFAULT_ITEMS not yet in localStorage
      PROJECTS[activeProject].defaultItems.forEach(def => {
        if (!items.find(i => i.id === def.id)) {
          items.push(JSON.parse(JSON.stringify(def)));
        }
      });
      // migrate fields
      items.forEach(i => {
        if (i.priority   === undefined) i.priority   = false;
        if (i.note       === undefined) i.note       = '';
        if (i.inProgress === undefined) i.inProgress = false;
        if (i.cat        === undefined) i.cat        = null;
      });
      // fix any duplicate t8 in stored data — rename old Stopki Gmail t8 to t10
      const t8s = items.filter(i => i.id === 't8');
      if (t8s.length > 1) {
        const youtubeIdx = t8s.findIndex(i => i.text.includes('YouTube'));
        t8s.forEach((it, idx) => { if (idx !== youtubeIdx) it.id = 't10'; });
      }
    }
    if (state.sections) state.sections.forEach(ss => {
      const s = sections.find(x => x.id === ss.id);
      if (s) s.collapsed = ss.collapsed;
    });
    if (state.quadsCollapsed)    Object.assign(QUADS_COLLAPSED, state.quadsCollapsed);
    if (state.doneSubsCollapsed) Object.assign(DONE_SUBS_COLLAPSED, state.doneSubsCollapsed);
    const ts = state._saved ? new Date(state._saved).toLocaleString('pl-PL') : null;
    document.getElementById('last-saved').textContent = ts ? `Zapis: ${ts}` : '—';
  } catch(e) {}
  loadUndoStack();
  loadLog();
  renderLog();
}

let recognition = null;
let micActive   = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('⚠ Przeglądarka nie obsługuje dyktowania', false);
    return;
  }
  if (micActive) {
    recognition && recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang          = 'pl-PL';
  recognition.interimResults = true;
  recognition.continuous    = false;

  const input = document.getElementById('new-text');
  const btn   = document.getElementById('btn-mic');
  const base  = input.value;

  recognition.onstart = () => {
    micActive = true;
    btn.classList.add('recording');
    btn.textContent = '⏹';
  };

  recognition.onresult = e => {
    let interim = '';
    let final   = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final   += e.results[i][0].transcript;
      else                      interim += e.results[i][0].transcript;
    }
    input.value = (base + (final || interim)).trim();
  };

  recognition.onend = () => {
    micActive = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    input.focus();
  };

  recognition.onerror = e => {
    micActive = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    if (e.error !== 'no-speech') showToast('⚠ Błąd mikrofonu: ' + e.error, false);
  };

  recognition.start();
}

let editMicRecognition = null;

// ════════════════════════════════════════
//  GLOBAL VOICE COMMANDS
// ════════════════════════════════════════
let cmdRecognition = null;
let cmdActive      = false;

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
}

function findItemByText(query) {
  const q = norm(query);
  return items.filter(i => !i.checked).find(i => norm(i.text).includes(q)) || null;
}

function getVoiceItems() {
  const result = [];
  sections.filter(s => s.id !== 'done').forEach(sec => {
    if (sec.id === 'todo') {
      QUADS.forEach(q => {
        items.filter(i => i.sec === 'todo' && i.quad === q.id && !i.checked)
          .sort((a,b) => (b.priority?1:0)-(a.priority?1:0))
          .forEach(i => result.push(i));
      });
    } else {
      items.filter(i => i.sec === sec.id && !i.checked)
        .sort((a,b) => (b.priority?1:0)-(a.priority?1:0))
        .forEach(i => result.push(i));
    }
  });
  return result;
}

function voiceCommand(text) {
  const t = norm(text);

  if (/^cofnij/.test(t))  { undo(); return; }
  if (/^zapisz/.test(t))  { saveState(); logAction('💾', 'Zapisano stan'); return; }
  if (/poka[zz]\s+wszystkie/.test(t)) { setFilter('all');      logAction('🔍','Filtr: wszystkie'); return; }
  if (/poka[zz]\s+(dzisiaj|dzis)/.test(t)) { setFilter('today');   logAction('🔍','Filtr: dziś'); return; }
  if (/poka[zz]\s+priorytety/.test(t))     { setFilter('priority');logAction('🔍','Filtr: priorytety'); return; }

  const addM = /^dodaj(\s+zadanie)?\s+/i.exec(text);
  if (addM) { addVoiceItem(text.slice(addM[0].length).trim()); return; }

  const delM = /^usu[nń](\s+zadanie|\s+pozycj[eę]|\s+numer)?\s+/i.exec(text);
  if (delM) {
    const rest = text.slice(delM[0].length).trim();
    if (/^\d+$/.test(rest)) deleteByNum(parseInt(rest));
    else                     deleteByText(rest);
    return;
  }

  const doneM = /^(zr[oó]b|zaznacz|odznacz)(\s+zadanie|\s+numer)?\s+/i.exec(text);
  if (doneM) {
    const rest = text.slice(doneM[0].length).trim();
    if (/^\d+$/.test(rest)) checkByNum(parseInt(rest));
    else                     checkByText(rest);
    return;
  }

  showToast(`⚠ Nie rozumiem: "${text.slice(0,35)}"`, false);
}

function addVoiceItem(text) {
  if (!text) return;
  const id = 'vc' + Date.now();
  pushHistory();
  items.push({ id, sec:'todo', quad:'q2', checked:false, priority:false, pawel:false, note:'', text });
  const s = sections.find(x => x.id === 'todo');
  if (s) s.collapsed = false;
  QUADS_COLLAPSED['q2'] = false;
  render(); autoSave();
  logAction('➕', `Dodano: ${text.slice(0,55)}`);
  showToast('🎙 Dodano: ' + text.slice(0,40), false);
}

function deleteByNum(n) {
  const list = getVoiceItems();
  const item = list[n-1];
  if (!item) { showToast(`⚠ Nie ma pozycji #${n}`, false); return; }
  logAction('✕', `Usunięto: ${item.text.slice(0,55)}`);
  deleteItem(item.id);
}

function deleteByText(query) {
  const item = findItemByText(query);
  if (!item) { showToast(`⚠ Nie znaleziono: "${query.slice(0,30)}"`, false); return; }
  logAction('✕', `Usunięto: ${item.text.slice(0,55)}`);
  deleteItem(item.id);
}

function checkByNum(n) {
  const list = getVoiceItems();
  const item = list[n-1];
  if (!item) { showToast(`⚠ Nie ma pozycji #${n}`, false); return; }
  logAction('✓', `Zrobione: ${item.text.slice(0,55)}`);
  toggleCheck(item.id);
}

function checkByText(query) {
  const item = findItemByText(query);
  if (!item) { showToast(`⚠ Nie znaleziono: "${query.slice(0,30)}"`, false); return; }
  logAction('✓', `Zrobione: ${item.text.slice(0,55)}`);
  toggleCheck(item.id);
}

function toggleGlobalMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('⚠ Przeglądarka nie obsługuje mowy', false);
    return;
  }
  if (cmdActive) { cmdRecognition && cmdRecognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  cmdRecognition = new SR();
  cmdRecognition.lang           = 'pl-PL';
  cmdRecognition.interimResults = true;
  cmdRecognition.continuous     = false;

  const fab    = document.getElementById('voice-fab');
  const status = document.getElementById('voice-status');
  const stTxt  = document.getElementById('vs-txt');

  cmdRecognition.onstart = () => {
    cmdActive = true;
    if (fab)    { fab.classList.add('cmd-on'); fab.textContent = '⏹'; }
    if (status) status.classList.add('on');
    if (stTxt)  stTxt.textContent = '…';
  };

  cmdRecognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final   += e.results[i][0].transcript;
      else                      interim += e.results[i][0].transcript;
    }
    const heard = final || interim;
    if (stTxt) stTxt.textContent = heard;
    if (final) voiceCommand(final.trim());
  };

  cmdRecognition.onend = () => {
    cmdActive = false;
    if (fab)    { fab.classList.remove('cmd-on'); fab.textContent = '🎙️'; }
    if (status) setTimeout(() => status.classList.remove('on'), 1500);
  };

  cmdRecognition.onerror = e => {
    cmdActive = false;
    if (fab)    { fab.classList.remove('cmd-on'); fab.textContent = '🎙️'; }
    if (status) status.classList.remove('on');
    if (e.error !== 'no-speech') showToast('⚠ Błąd mikrofonu: ' + e.error, false);
  };

  cmdRecognition.start();
}

let projectsSubView = null; // null = karta projektu; 'szpilki' etc = otwarty projekt

function switchProject(pid) {
  if (pid === activeProject && pid !== 'projekty') return;
  saveState(true);
  activeProject = pid;
  projectsSubView = null;

  const allowedSecs1 = SECTIONS_BY_PROJECT[pid] || ['todo','ai','pawel','done'];
  sections = SECTIONS_DEF.filter(s => allowedSecs1.includes(s.id)).map(s => JSON.parse(JSON.stringify(s)));
  Object.assign(QUADS_COLLAPSED,     { q1:false, q2:false, q3:true, q4:true });
  Object.assign(DONE_SUBS_COLLAPSED, { 'ds-todo':false, 'ds-ai':false, 'ds-pawel':false });
  activeFilter = 'all';
  editingId    = null;
  weekViewOpen = false;

  const form = document.getElementById('add-form');
  const btn  = document.getElementById('btn-open-add');
  if (form)  form.classList.remove('open');
  if (btn)   btn.innerHTML = '+ Nowe zadanie <kbd style="font-size:9px;opacity:.5">N</kbd>';

  // hide/show add button + filter bar in projects view
  const filterBar = document.querySelector('.filter-bar');
  const actionsBar = document.querySelector('.actions');
  const hideUI = pid === 'projekty';
  if (filterBar)  filterBar.style.display  = hideUI ? 'none' : '';
  if (actionsBar) actionsBar.style.display = hideUI ? 'none' : '';

  if (pid === 'general') {
    items = loadAggregateItems();
  } else if (pid === 'projekty') {
    items = [];
  } else {
    loadState();
  }

  render();

  document.querySelectorAll('.proj-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById('pt-' + pid);
  if (tabEl) tabEl.classList.add('active');

  const titles = { general:'Wszystkie', prywatne:'Prywatne', dp:'DOP', vns:'VNS', projekty:'Projekty', szpilki:'Zdunek — Szpilki', vibecoding:'Vibe Coding' };
  document.getElementById('proj-title').textContent = titles[pid] || (PROJECTS[pid] && PROJECTS[pid].label) || pid;
}

function openSubProject(key) {
  projectsSubView = key;
  saveState(true);
  activeProject = key;
  const allowedSecs2 = SECTIONS_BY_PROJECT[key] || ['todo','ai','pawel','done'];
  sections = SECTIONS_DEF.filter(s => allowedSecs2.includes(s.id)).map(s => JSON.parse(JSON.stringify(s)));
  Object.assign(QUADS_COLLAPSED,     { q1:false, q2:false, q3:true, q4:true });
  Object.assign(DONE_SUBS_COLLAPSED, { 'ds-todo':false, 'ds-ai':false, 'ds-pawel':false });
  activeFilter = 'all'; editingId = null; weekViewOpen = false;
  const filterBar  = document.querySelector('.filter-bar');
  const actionsBar = document.querySelector('.actions');
  if (filterBar)  filterBar.style.display  = '';
  if (actionsBar) actionsBar.style.display = '';
  loadState();
  render();
  document.getElementById('proj-title').textContent = SUB_PROJECTS[key] ? SUB_PROJECTS[key].label : key;
}

}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal(); }

function renderCal() {
  const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  document.getElementById('cal-title').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const wrap = document.getElementById('cal-grid-wrap');
  const grid = document.getElementById('cal-grid');

  // build days header
  const DAY_LABELS = ['Pon','Wt','Śr','Czw','Pt','Sob','Niedz'];
  const existing = wrap.querySelector('.cal-days-hd');
  if (existing) existing.remove();
  const hd = document.createElement('div');
  hd.className = 'cal-days-hd';
  hd.innerHTML = DAY_LABELS.map(d => `<div class="cal-day-lbl">${d}</div>`).join('');
  wrap.insertBefore(hd, grid);

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

  // collect tasks with dates
  const tasksByDate = {};
  items.forEach(item => {
    const dt = getItemDate(item);
    if (!dt) return;
    const key = dt.toISOString().slice(0, 10);
    if (!tasksByDate[key]) tasksByDate[key] = [];
    tasksByDate[key].push(item);
  });

  grid.innerHTML = '';
  for (let i = 0; i < startDow; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-cell other-month';
    grid.appendChild(blank);
  }
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const cell = document.createElement('div');
    const dt   = new Date(calYear, calMonth, d);
    const key  = dt.toISOString().slice(0, 10);
    const isToday = dt.toDateString() === TODAY.toDateString();
    cell.className = 'cal-cell' + (isToday ? ' today' : '');
    const tasks = tasksByDate[key] || [];
    cell.innerHTML = `<div class="cal-cell-num">${d}</div>` +
      tasks.slice(0, 3).map(t =>
        `<div class="cal-task${t.checked ? ' done' : t.inProgress ? ' inprogress' : ''}" title="${escHtml(t.text)}">${escHtml(t.text.slice(0, 20))}</div>`
      ).join('') +
      (tasks.length > 3 ? `<div style="font-size:9px;color:var(--muted)">+${tasks.length - 3} więcej</div>` : '');
    grid.appendChild(cell);
  }
}

// ════════════════════════════════════════
//  BULK SELECT
// ════════════════════════════════════════
const selectedIds = new Set();

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateBulkToolbar();
  render();
}

function updateBulkToolbar() {
  const tb  = document.getElementById('bulk-toolbar');
  const cnt = document.getElementById('bulk-count');
  if (!tb) return;
  tb.style.display = selectedIds.size > 0 ? 'flex' : 'none';
  if (cnt) cnt.textContent = `${selectedIds.size} zaznaczonych`;
}

function clearSelection() {
  selectedIds.clear();
  updateBulkToolbar();
  render();
}

function applyBulkDate() {
  const dateEl  = document.getElementById('bulk-date');
  const dateStr = pickerToDisplay(dateEl.value);
  if (!dateStr) { showToast('⚠ Wybierz datę', false); return; }
  const count = selectedIds.size;
  pushHistory();
  selectedIds.forEach(id => {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.text = item.text.replace(/\s*[—–]\s*\d{1,2}\.\d{2}(\.\d{2,4})?$/, '').trim() + ' — ' + dateStr;
  });
  clearSelection();
  render(); autoSave();
  showToast(`📅 Data dodana do ${count} zadań`, false);
}

function applyBulkStatus(status) {
  pushHistory();
  selectedIds.forEach(id => {
    const item = items.find(i => i.id === id);
    if (!item || item.checked) return;
    if (status === 'inprogress') item.inProgress = true;
  });
  clearSelection();
  render(); autoSave();
}

// Initial load — localStorage (fast), then Supabase sync in background
if (activeProject === 'general') {
  items = loadAggregateItems();
} else {
  loadState();
}
render();
onSecChange();
setTimeout(syncFromSupabase, 200);
</script>
