    localStorage.setItem(PROJECTS[activeProject].storageKey, JSON.stringify(state));
  }
  document.getElementById('last-saved').textContent = `Zapis: ${new Date().toLocaleString('pl-PL')}`;
  if (!silent) showToast('✓ Zapisano', false);
}

let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveState(true);
    if (activeProject === 'general') {
      CAT_PROJECTS.forEach(catKey => sbSave(items.filter(i => i.cat === catKey), catKey));
    } else if (activeProject !== 'projekty') {
      sbSave(items, activeProject);
    }
  }, 700);
}

function loadState() {
  try {
    const raw = localStorage.getItem(PROJECTS[activeProject].storageKey);
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.items) {
      items = state.items;
      // merge new DEFAULT_ITEMS not yet in localStorage
      PROJECTS[activeProject].defaultItems.forEach(def => {
        if (!items.find(i => i.id === def.id)) {
          items.push(JSON.parse(JSON.stringify(def)));
        }
      });
      // migrate fields
      items.forEach(i => {
        if (i.priority   === undefined) i.priority   = false;
        if (i.note       === undefined) i.note       = '';
        if (i.inProgress === undefined) i.inProgress = false;
        if (i.cat        === undefined) i.cat        = null;
      });
      // fix any duplicate t8 in stored data — rename old Stopki Gmail t8 to t10
      const t8s = items.filter(i => i.id === 't8');
      if (t8s.length > 1) {
        const youtubeIdx = t8s.findIndex(i => i.text.includes('YouTube'));
        t8s.forEach((it, idx) => { if (idx !== youtubeIdx) it.id = 't10'; });
      }
    }
    if (state.sections) state.sections.forEach(ss => {
      const s = sections.find(x => x.id === ss.id);
      if (s) s.collapsed = ss.collapsed;
    });
    if (state.quadsCollapsed)    Object.assign(QUADS_COLLAPSED, state.quadsCollapsed);
    if (state.doneSubsCollapsed) Object.assign(DONE_SUBS_COLLAPSED, state.doneSubsCollapsed);
    const ts = state._saved ? new Date(state._saved).toLocaleString('pl-PL') : null;
    document.getElementById('last-saved').textContent = ts ? `Zapis: ${ts}` : '—';
  } catch(e) {}
  loadUndoStack();
  loadLog();
  renderLog();
}

let recognition = null;
let micActive   = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('⚠ Przeglądarka nie obsługuje dyktowania', false);
    return;
  }
  if (micActive) {
    recognition && recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang          = 'pl-PL';
  recognition.interimResults = true;
  recognition.continuous    = false;

  const input = document.getElementById('new-text');
  const btn   = document.getElementById('btn-mic');
  const base  = input.value;

  recognition.onstart = () => {
    micActive = true;
    btn.classList.add('recording');
    btn.textContent = '⏹';
  };

  recognition.onresult = e => {
    let interim = '';
    let final   = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final   += e.results[i][0].transcript;
      else                      interim += e.results[i][0].transcript;
    }
    input.value = (base + (final || interim)).trim();
  };

  recognition.onend = () => {
    micActive = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    input.focus();
  };

  recognition.onerror = e => {
    micActive = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    if (e.error !== 'no-speech') showToast('⚠ Błąd mikrofonu: ' + e.error, false);
  };

  recognition.start();
}

let editMicActive = false;
let editMicRecognition = null;

function toggleEditMic(id) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('⚠ Przeglądarka nie obsługuje dyktowania', false);
    return;
  }
  if (editMicActive) {
    editMicRecognition && editMicRecognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  editMicRecognition = new SR();
  editMicRecognition.lang          = 'pl-PL';
  editMicRecognition.interimResults = true;
  editMicRecognition.continuous    = false;

  const input = document.getElementById('eit-' + id);
  const btn   = document.getElementById('emic-' + id);
  const base  = input ? input.value : '';

  editMicRecognition.onstart = () => {
    editMicActive = true;
    if (btn) { btn.classList.add('recording'); btn.textContent = '⏹'; }
  };

  editMicRecognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final   += e.results[i][0].transcript;
      else                      interim += e.results[i][0].transcript;
    }
    if (input) input.value = (base + (final || interim)).trim();
  };

  editMicRecognition.onend = () => {
    editMicActive = false;
    if (btn) { btn.classList.remove('recording'); btn.textContent = '🎤'; }
    if (input) input.focus();
  };

  editMicRecognition.onerror = e => {
    editMicActive = false;

    if (e.error !== 'no-speech') showToast('⚠ Błąd mikrofonu: ' + e.error, false);
  };

}

const MAX_LOG = 80;
let actionLog    = [];
let logCollapsed = true;

function logAction(icon, text) {
  const ts = new Date().toLocaleTimeString('pl-PL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  actionLog.unshift({ icon, text, ts });
  if (actionLog.length > MAX_LOG) actionLog.pop();
  saveLog();
  renderLog();
}

function saveLog() {

// ════════════════════════════════════════
//  GLOBAL VOICE COMMANDS
// ════════════════════════════════════════
let cmdRecognition = null;
let cmdActive      = false;

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
}

// ── Polish spoken-date normalizer ──
const _PL_ORDINALS = [
  ['trzydziestego pierwszego',31],['trzydziesty pierwszy',31],
  ['trzydziestego',30],['trzydziesty',30],
  ['dwudziestego dziewiatego',29],['dwudziesty dziewiety',29],
  ['dwudziestego osmego',28],['dwudziesty osmy',28],
  ['dwudziestego siodmego',27],['dwudziesty siodmy',27],
  ['dwudziestego szostego',26],['dwudziesty szosty',26],
  ['dwudziestego piatego',25],['dwudziesty piaty',25],
  ['dwudziestego czwartego',24],['dwudziesty czwarty',24],
  ['dwudziestego trzeciego',23],['dwudziesty trzeci',23],
  ['dwudziestego drugiego',22],['dwudziesty drugi',22],
  ['dwudziestego pierwszego',21],['dwudziesty pierwszy',21],
  ['dwudziestego',20],['dwudziesty',20],
  ['dziewietnaastego',19],['dziewietnasty',19],['dziewietnastego',19],
  ['osiemnastego',18],['osiemnasty',18],
  ['siedemnastego',17],['siedemnasty',17],
  ['szesnastego',16],['szesnasty',16],
  ['pietnaastego',15],['piętnastego',15],['pietnastego',15],['piętnasty',15],
  ['czternastego',14],['czternasty',14],
  ['trzynastego',13],['trzynasty',13],
  ['dwunastego',12],['dwunasty',12],
  ['jedenastego',11],['jedenasty',11],
  ['dziesiatego',10],['dziesiaty',10],
  ['dziewiatego',9],['dziewiaty',9],
  ['osmego',8],['osmy',8],
  ['siodmego',7],['siodmy',7],
  ['szostego',6],['szosty',6],
  ['piatego',5],['piaty',5],
  ['czwartego',4],['czwarty',4],
  ['trzeciego',3],['trzeci',3],
  ['drugiego',2],['drugi',2],
  ['pierwszego',1],['pierwszy',1],
];
const _PL_MONTH_NAMES = {
  'stycznia':'01','styczen':'01','stycznia':'01',
  'lutego':'02','luty':'02',
  'marca':'03','marzec':'03',
  'kwietnia':'04','kwiecien':'04',
  'maja':'05','maj':'05',
  'czerwca':'06','czerwiec':'06',
  'lipca':'07','lipiec':'07',
  'sierpnia':'08','sierpien':'08',
  'wrzesnia':'09','wrzesien':'09',
  'pazdziernika':'10','pazdziernik':'10',
  'listopada':'11','listopad':'11',
  'grudnia':'12','grudzien':'12',
};
// build normalized lookup
const _ordMap = {};
_PL_ORDINALS.forEach(([w,n]) => { _ordMap[norm(w)] = n; });
const _allOrdNorm = Object.keys(_ordMap).sort((a,b) => b.length - a.length);
const _monNorm = {};
Object.entries(_PL_MONTH_NAMES).forEach(([k,v]) => { _monNorm[norm(k)] = v; });
const _allMonNorm = Object.keys(_monNorm).sort((a,b) => b.length - a.length);

function _reEsc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function _pad2(n) { return String(n).padStart(2,'0'); }

function normalizeSpeechDates(text) {
  // 1. Decimal comma date: "10,06" → "10.06"
  text = text.replace(/\b(\d{1,2})[,]\s*0*(\d{1,2})\b/g, (_, d, m) => {
    if (+m >= 1 && +m <= 12 && +d >= 1 && +d <= 31) return `${d}.${_pad2(+m)}`;
    return _;
  });

  const t = norm(text);
  let result = text;

  // Helper: replace in original text preserving case position
  function replaceNorm(origText, normPattern, replacement) {
    const lower = norm(origText);
    let idx = lower.indexOf(normPattern);
    while (idx !== -1) {
      // approximate position in original (NFD may differ in length)
      result = origText.slice(0, idx) + replacement + origText.slice(idx + normPattern.length);
      origText = result;
      const newLower = norm(origText);
      idx = newLower.indexOf(normPattern);
    }
    return origText;
  }

  // 2. Digit + month name: "10 czerwca" → "10.06"
  const digitMonRx = new RegExp(
    '\\b(\\d{1,2})\\s+(' + _allMonNorm.map(_reEsc).join('|') + ')\\b', 'gi'
  );
  result = result.replace(digitMonRx, (_, d, m) => {
    const mm = _monNorm[norm(m)];
    return mm ? `${d}.${mm}` : _;
  });

  // 3. Ordinal + month name: "dziesiątego czerwca" → "10.06"
  const ordMonRx = new RegExp(
    '\\b(' + _allOrdNorm.map(_reEsc).join('|') + ')\\s+(' + _allMonNorm.map(_reEsc).join('|') + ')\\b', 'gi'
  );
  result = result.replace(ordMonRx, (_, d, m) => {
    const dd = _ordMap[norm(d)];
    const mm = _monNorm[norm(m)];
    return (dd && mm) ? `${_pad2(dd)}.${mm}` : _;
  });

  // 4. Ordinal + ordinal: "dziesiątego szóstego" → "10.06"
  const ordOrdRx = new RegExp(
    '\\b(' + _allOrdNorm.map(_reEsc).join('|') + ')\\s+(' + _allOrdNorm.map(_reEsc).join('|') + ')\\b', 'gi'
  );
  result = result.replace(ordOrdRx, (_, d, m) => {
    const dd = _ordMap[norm(d)];
    const mm = _ordMap[norm(m)];
    if (dd && mm && mm <= 12) return `${_pad2(dd)}.${_pad2(mm)}`;
    return _;
  });

  // 5. Digit + ordinal month: "10 szóstego" → "10.06"
  const digitOrdRx = new RegExp(
    '\\b(\\d{1,2})\\s+(' + _allOrdNorm.map(_reEsc).join('|') + ')\\b', 'gi'
  );
  result = result.replace(digitOrdRx, (_, d, m) => {
    const mm = _ordMap[norm(m)];
    if (mm && mm <= 12) return `${d}.${_pad2(mm)}`;
    return _;
  });

  return result;
}

function findItemByText(query) {
  const q = norm(query);
  return items.filter(i => !i.checked).find(i => norm(i.text).includes(q)) || null;
}

function getVoiceItems() {
  const result = [];
  sections.filter(s => s.id !== 'done').forEach(sec => {
    if (sec.id === 'todo') {
      QUADS.forEach(q => {
        items.filter(i => i.sec === 'todo' && i.quad === q.id && !i.checked)
          .forEach(i => result.push(i));
      });
    } else {
      items.filter(i => i.sec === sec.id && !i.checked)
        .forEach(i => result.push(i));
    }
  });
  return result;
}

function voiceCommand(text) {
  text = normalizeSpeechDates(text);
  const t = norm(text);

  if (/^cofnij/.test(t))  { undo(); return; }
  if (/^zapisz/.test(t))  { saveState(); logAction('💾', 'Zapisano stan'); return; }
  if (/poka[zz]\s+wszystkie/.test(t)) { setFilter('all');      logAction('🔍','Filtr: wszystkie'); return; }
  if (/poka[zz]\s+(dzisiaj|dzis)/.test(t)) { setFilter('today');   logAction('🔍','Filtr: dziś'); return; }
  if (/poka[zz]\s+priorytety/.test(t))     { setFilter('priority');logAction('🔍','Filtr: priorytety'); return; }

  const addM = /^dodaj(\s+zadanie)?\s+/i.exec(text);
  if (addM) { addVoiceItem(text.slice(addM[0].length).trim()); return; }

  const delM = /^usu[nń](\s+zadanie|\s+pozycj[eę]|\s+numer)?\s+/i.exec(text);
  if (delM) {
    const rest = text.slice(delM[0].length).trim();
    if (/^\d+$/.test(rest)) deleteByNum(parseInt(rest));
    else                     deleteByText(rest);
    return;
  }

  const doneM = /^(zr[oó]b|zaznacz|odznacz)(\s+zadanie|\s+numer)?\s+/i.exec(text);
  if (doneM) {
    const rest = text.slice(doneM[0].length).trim();
    if (/^\d+$/.test(rest)) checkByNum(parseInt(rest));
    else                     checkByText(rest);
    return;
  }

  showToast(`⚠ Nie rozumiem: "${text.slice(0,35)}"`, false);
}

function addVoiceItem(text) {
  if (!text) return;
  text = normalizeSpeechDates(text);
  const id = 'vc' + Date.now();
  pushHistory();
  items.push({ id, sec:'todo', quad:'q2', checked:false, priority:false, pawel:false, note:'', text });
  const s = sections.find(x => x.id === 'todo');
  if (s) s.collapsed = false;
  QUADS_COLLAPSED['q2'] = false;
  render(); autoSave();
  logAction('➕', `Dodano: ${text.slice(0,55)}`);
  showToast('🎙 Dodano: ' + text.slice(0,40), false);
}

function deleteByNum(n) {
  const list = getVoiceItems();
  const item = list[n-1];
  if (!item) { showToast(`⚠ Nie ma pozycji #${n}`, false); return; }
  logAction('✕', `Usunięto: ${item.text.slice(0,55)}`);
  deleteItem(item.id);
}

function deleteByText(query) {
  const item = findItemByText(query);
  if (!item) { showToast(`⚠ Nie znaleziono: "${query.slice(0,30)}"`, false); return; }
  logAction('✕', `Usunięto: ${item.text.slice(0,55)}`);
  deleteItem(item.id);
}

function checkByNum(n) {
  const list = getVoiceItems();
  const item = list[n-1];
  if (!item) { showToast(`⚠ Nie ma pozycji #${n}`, false); return; }
  logAction('✓', `Zrobione: ${item.text.slice(0,55)}`);
  toggleCheck(item.id);
}

function checkByText(query) {
  const item = findItemByText(query);
  if (!item) { showToast(`⚠ Nie znaleziono: "${query.slice(0,30)}"`, false); return; }
  logAction('✓', `Zrobione: ${item.text.slice(0,55)}`);
  toggleCheck(item.id);
}

function toggleGlobalMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('⚠ Przeglądarka nie obsługuje mowy', false);
    return;
  }
  if (cmdActive) { cmdRecognition && cmdRecognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  cmdRecognition = new SR();
  cmdRecognition.lang           = 'pl-PL';
  cmdRecognition.interimResults = true;
  cmdRecognition.continuous     = false;

  const fab    = document.getElementById('voice-fab');
  const status = document.getElementById('voice-status');
  const stTxt  = document.getElementById('vs-txt');

  cmdRecognition.onstart = () => {
    cmdActive = true;
    if (fab)    { fab.classList.add('cmd-on'); fab.textContent = '⏹'; }
    if (status) status.classList.add('on');
    if (stTxt)  stTxt.textContent = '…';
  };

  cmdRecognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final   += e.results[i][0].transcript;
      else                      interim += e.results[i][0].transcript;
    }
    const heard = final || interim;
    if (stTxt) stTxt.textContent = heard;
    if (final) voiceCommand(final.trim());
  };

  cmdRecognition.onend = () => {
    cmdActive = false;
    if (fab)    { fab.classList.remove('cmd-on'); fab.textContent = '🎙️'; }
    if (status) setTimeout(() => status.classList.remove('on'), 1500);
  };

  cmdRecognition.onerror = e => {
    cmdActive = false;
    if (fab)    { fab.classList.remove('cmd-on'); fab.textContent = '🎙️'; }
    if (status) status.classList.remove('on');
    if (e.error !== 'no-speech') showToast('⚠ Błąd mikrofonu: ' + e.error, false);
  };

  cmdRecognition.start();
}

let projectsSubView = null; // null = karta projektu; 'szpilki' etc = otwarty projekt

function switchProject(pid) {
  if (pid === activeProject && pid !== 'projekty') return;
  saveState(true);
  activeProject = pid;
  projectsSubView = null;

  const allowedSecs1 = SECTIONS_BY_PROJECT[pid] || ['todo','ai','pawel','done'];
  sections = SECTIONS_DEF.filter(s => allowedSecs1.includes(s.id)).map(s => JSON.parse(JSON.stringify(s)));
  Object.assign(QUADS_COLLAPSED,     { q1:false, q2:false, q3:true, q4:true });
  Object.assign(DONE_SUBS_COLLAPSED, { 'ds-todo':false, 'ds-ai':false, 'ds-pawel':false });
  activeFilter = 'all';
  editingId    = null;
  weekViewOpen = false;

  const form = document.getElementById('add-form');
  const btn  = document.getElementById('btn-open-add');
  if (form)  form.classList.remove('open');
  if (btn)   btn.innerHTML = '+ Nowe zadanie <kbd style="font-size:9px;opacity:.5">N</kbd>';

  // hide/show add button + filter bar in projects view
  const filterBar = document.querySelector('.filter-bar');

  if (filterBar)  filterBar.style.display  = hideUI ? 'none' : '';
  if (actionsBar) actionsBar.style.display = hideUI ? 'none' : '';

  if (pid === 'general') {
    items = loadAggregateItems();
  } else if (pid === 'projekty') {
    items = [];
  } else {
    loadState();
  }

  render();

  document.querySelectorAll('.proj-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById('pt-' + pid);
  if (tabEl) tabEl.classList.add('active');

  const titles = { general:'Wszystkie', prywatne:'Prywatne', dp:'DOP', vns:'VNS', projekty:'Projekty', szpilki:'Zdunek — Szpilki', vibecoding:'Vibe Coding' };
  document.getElementById('proj-title').textContent = titles[pid] || (PROJECTS[pid] && PROJECTS[pid].label) || pid;
}

function openSubProject(key) {
  projectsSubView = key;
  saveState(true);
  activeProject = key;
  const allowedSecs2 = SECTIONS_BY_PROJECT[key] || ['todo','ai','pawel','done'];
  sections = SECTIONS_DEF.filter(s => allowedSecs2.includes(s.id)).map(s => JSON.parse(JSON.stringify(s)));
  Object.assign(QUADS_COLLAPSED,     { q1:false, q2:false, q3:true, q4:true });

}

let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();

function toggleCalendar() {
  const ov = document.getElementById('cal-overlay');
  ov.style.display = ov.style.display === 'none' ? 'flex' : 'none';
  if (ov.style.display === 'flex') renderCal();
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal(); }

function renderCal() {
  const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  document.getElementById('cal-title').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const wrap = document.getElementById('cal-grid-wrap');
  const grid = document.getElementById('cal-grid');

  // build days header
  const DAY_LABELS = ['Pon','Wt','Śr','Czw','Pt','Sob','Niedz'];
  const existing = wrap.querySelector('.cal-days-hd');
  if (existing) existing.remove();
  const hd = document.createElement('div');
  hd.className = 'cal-days-hd';
  hd.innerHTML = DAY_LABELS.map(d => `<div class="cal-day-lbl">${d}</div>`).join('');
  wrap.insertBefore(hd, grid);

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

  // collect tasks with dates
  const tasksByDate = {};
  items.forEach(item => {
    const dt = getItemDate(item);
    if (!dt) return;
    const key = dt.toISOString().slice(0, 10);
    if (!tasksByDate[key]) tasksByDate[key] = [];
    tasksByDate[key].push(item);
  });

  grid.innerHTML = '';
  for (let i = 0; i < startDow; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-cell other-month';
    grid.appendChild(blank);
  }
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const cell = document.createElement('div');
    const dt   = new Date(calYear, calMonth, d);
    const key  = dt.toISOString().slice(0, 10);
    const isToday = dt.toDateString() === TODAY.toDateString();
    cell.className = 'cal-cell' + (isToday ? ' today' : '');
    const tasks = tasksByDate[key] || [];
    cell.innerHTML = `<div class="cal-cell-num">${d}</div>` +
      tasks.slice(0, 3).map(t =>
        `<div class="cal-task${t.checked ? ' done' : t.inProgress ? ' inprogress' : ''}" title="${escHtml(t.text)}">${escHtml(t.text.slice(0, 20))}</div>`
      ).join('') +
      (tasks.length > 3 ? `<div style="font-size:9px;color:var(--muted)">+${tasks.length - 3} więcej</div>` : '');
    grid.appendChild(cell);
  }
}

    if (ta) { ta.focus(); ta.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }, 100);
}

// ── Mobile Bottom Nav ──
function initMobileNav() {
  const nav = document.createElement('nav');
  nav.className = 'mobile-nav';
  nav.id = 'mobile-nav';

  const tabs = [
    { key: 'general',   icon: '📋', label: 'Wszystkie' },
    { key: 'prywatne',  icon: '🔴', label: 'Prywatne'  },
    { key: 'dp',        icon: '🎬', label: 'DOP'        },
    { key: 'vns',       icon: '📱', label: 'VNS'        },
    { key: 'projekty',  icon: '📂', label: 'Projekty'   },
  ];

  tabs.forEach(t => {
    const b = document.createElement('button');
    b.className = 'mnav-btn' + (activeProject === t.key ? ' active' : '');
    b.id = 'mnav-' + t.key;
    b.innerHTML = `<span class="mn-icon">${t.icon}</span>${t.label}`;
    b.onclick = () => {
      document.querySelectorAll('.mnav-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      switchProject(t.key);
    };
    nav.appendChild(b);
  });

  // "Więcej" button → bottom sheet z pozostałymi zakładkami
  const more = document.createElement('button');
  more.className = 'mnav-btn';
  more.innerHTML = `<span class="mn-icon">⋯</span>Więcej`;
  more.onclick = () => showMoreNav();
  nav.appendChild(more);

  document.body.appendChild(nav);
}

function showMoreNav() {
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.innerHTML = `<div class="sheet-handle"></div><div class="sheet-title">Więcej widoków</div><div class="sheet-actions"></div>`;
  const acts = sheet.querySelector('.sheet-actions');

  [
    { key: 'vibecoding', icon: '💻', label: 'Vibe Coding' },
    { key: 'telegram',   icon: '📲', label: 'Telegram'    },
    { key: 'spotkania',  icon: '🤝', label: 'Spotkania'   },
  ].forEach(({ key, icon, label }) => {
    const b = document.createElement('button');
    b.className = 'sheet-btn';
    b.innerHTML = `<span class="sh-icon">${icon}</span>${label}`;
    b.onclick = () => { overlay.remove(); switchProject(key); };
    acts.appendChild(b);
  });

  // Eksport / Import
  const expBtn = document.createElement('button');
  expBtn.className = 'sheet-btn';
  expBtn.innerHTML = `<span class="sh-icon">⬇</span>Eksportuj JSON`;
  expBtn.onclick = () => { overlay.remove(); exportJSON(); };
  acts.appendChild(expBtn);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

if (window.innerWidth <= 640) initMobileNav();
window.addEventListener('resize', () => {
  const nav = document.getElementById('mobile-nav');
  if (window.innerWidth <= 640 && !nav) initMobileNav();
});
</script>
