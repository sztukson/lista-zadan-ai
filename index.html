<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#39d0c8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Lista">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Lista Zadań AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e;
    --cyan:#39d0c8; --green:#3fb950; --yellow:#d29922;
    --red:#f85149; --blue:#58a6ff; --purple:#bc8cff; --orange:#e67e22;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 36px 20px; font-size: 14px; }
  .container { max-width: 900px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--cyan); letter-spacing: -.02em; margin-bottom: 4px; }
  .header p  { font-size: 12px; color: var(--muted); }

  .overview { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; text-align: center; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono',monospace; margin-bottom: 3px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

  .main-progress { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 14px 16px; margin-bottom: 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .progress-label { font-size: 12px; font-weight: 600; }
  .progress-pct   { font-size: 17px; font-weight: 700; font-family: 'JetBrains Mono',monospace; color: var(--cyan); }
  .bar-track { height: 7px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg,var(--cyan),var(--green)); transition: width .5s cubic-bezier(.4,0,.2,1); }

  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 10px; flex-wrap: wrap; }
  .btn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; background: var(--surface2); color: var(--muted); }
  .btn:hover { color: var(--text); border-color: var(--cyan); }
  .btn-undo { color: var(--blue); }
  .btn-undo:hover { border-color: var(--blue); }
  .btn-week { color: var(--purple); }
  .btn-week:hover { border-color: var(--purple); color: var(--purple); }
  .btn-week.active { background: rgba(188,140,255,.1); border-color: var(--purple); color: var(--purple); }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; flex-shrink: 0; }
  .btn-filter {
    padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    background: var(--surface2); color: var(--muted); transition: all .15s;
  }
  .btn-filter:hover { color: var(--text); }
  .btn-filter.active { border-color: var(--cyan); color: var(--cyan); background: rgba(57,208,200,.1); }

  /* WEEK VIEW */
  .week-view {
    background: var(--surface); border: 1px solid rgba(188,140,255,.25);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
    display: none;
  }
  .week-view.open { display: block; }
  .week-view-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .week-view-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--purple); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-col { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; min-height: 50px; }
  .week-col-hd {
    padding: 5px 6px; font-size: 10px; font-weight: 700; text-align: center;
    text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .week-col-hd small { display: block; font-size: 9px; font-family: 'JetBrains Mono',monospace; font-weight: 400; opacity: .7; margin-top: 1px; }
  .week-col.wc-today .week-col-hd { background: rgba(230,126,34,.15); color: var(--orange); border-color: rgba(230,126,34,.3); }
  .week-col.wc-overdue .week-col-hd { background: rgba(248,81,73,.08); color: var(--red); }
  .week-col-body { padding: 4px; }
  .week-item {
    font-size: 10px; padding: 3px 5px; border-radius: 4px;
    margin-bottom: 2px; background: var(--bg);
    color: var(--text); line-height: 1.3; cursor: default;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-left: 2px solid transparent;
  }
  .week-item.wi-priority { border-left-color: var(--yellow); color: var(--yellow); }
  .week-item.wi-pawel    { border-left-color: var(--purple); }
  .week-no-items { font-size: 10px; color: var(--border); text-align: center; padding: 8px 0; }

  /* SECTION */
  .section { margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .section.drag-target > .sec-body { outline: 2px solid var(--cyan); outline-offset: -4px; border-radius: 8px; }

  .sec-header {
    display: flex; align-items: center; gap: 9px;
    padding: 11px 16px; cursor: pointer; user-select: none;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--text);
    transition: background .12s; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .sec-header:hover { background: #2d333b; }
  .section.collapsed .sec-header { border-bottom-color: transparent; }
  .sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sec-count { margin-left: auto; background: var(--surface2); padding: 1px 7px; border-radius: 10px; font-size: 10px; }
  .sec-chevron { font-size: 10px; transition: transform .2s; }
  .section.collapsed .sec-chevron { transform: rotate(-90deg); }

  .sec-body { padding: 8px; min-height: 10px; }
  .section.collapsed .sec-body { display: none; }

  /* QUADRANTS — vertical stack */
  .matrix { display: flex; flex-direction: column; gap: 8px; }

  .quadrant {
    border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .quadrant.drag-target { border-color: var(--cyan); background: rgba(57,208,200,.04); }
  .quadrant.q-collapsed .q-body { display: none; }
  .quadrant.q-collapsed .q-header { border-bottom-color: transparent; }

  .q-header {
    padding: 9px 13px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    display: flex; align-items: center; gap: 7px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: filter .12s;
  }
  .q-header:hover { filter: brightness(1.15); }
  .q-header .q-icon { font-size: 14px; }
  .q-header .q-count { margin-left: auto; font-size: 10px; opacity: .6; }
  .q-chevron { font-size: 10px; transition: transform .2s; }
  .quadrant.q-collapsed .q-chevron { transform: rotate(-90deg); }
  .q-desc { font-size: 9px; font-weight: 400; opacity: .65; margin-left: 2px; }
  .q-body { padding: 5px; min-height: 30px; }

  .q1 .q-header { background: rgba(248,81,73,.1);  color: var(--red);    }
  .q2 .q-header { background: rgba(210,153,34,.1); color: var(--yellow); }
  .q3 .q-header { background: rgba(230,126,34,.1); color: var(--orange); }
  .q4 .q-header { background: rgba(139,148,158,.1);color: var(--muted);  }

  /* DONE SUBSECTIONS */
  .done-sub { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; margin: 4px 0; }
  .done-sub.collapsed .done-sub-body { display: none; }
  .done-sub.collapsed .done-sub-hd { border-bottom-color: transparent; }
  .done-sub-hd {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    background: var(--bg); transition: background .12s;
  }
  .done-sub-hd:hover { background: var(--surface2); }
  .done-sub-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .done-sub-count { margin-left: auto; opacity: .55; font-size: 9px; }
  .done-sub-chevron { font-size: 9px; transition: transform .2s; margin-left: 4px; }
  .done-sub.collapsed .done-sub-chevron { transform: rotate(-90deg); }
  .done-sub-body { padding: 4px; }

  /* ITEM */
  .item {
    display: flex; align-items: flex-start; gap: 9px; flex-wrap: wrap;
    padding: 8px 9px; border-radius: 6px; margin-bottom: 2px;
    border: 1px solid transparent; transition: background .12s, border-color .12s;
    position: relative;
  }
  .item:hover { background: var(--surface2); }
  .item.drag-over-top    { border-top: 2px solid var(--cyan) !important; }
  .item.drag-over-bottom { border-bottom: 2px solid var(--cyan) !important; }
  .item.dragging         { opacity: .2; }
  .item.is-done .item-text { text-decoration: line-through; color: var(--muted); }
  .item.is-done .num       { opacity: .4; }
  .item.is-inprogress      { border-left: 3px solid rgba(230,126,34,.6); background: rgba(230,126,34,.04); }
  .item.is-inprogress .item-text { font-style: italic; }

  .num { font-size: 11px; font-weight: 700; color: var(--muted); font-family: 'JetBrains Mono',monospace; min-width: 18px; text-align: right; flex-shrink: 0; margin-top: 2px; }
  .drag-handle { color: var(--border); font-size: 11px; cursor: grab; flex-shrink: 0; margin-top: 2px; transition: color .12s; }
  .item:hover .drag-handle { color: var(--muted); }

  .cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all .15s; }
  .cb:hover { border-color: var(--cyan); background: rgba(57,208,200,.08); }
  .cb.checked { background: var(--green); border-color: var(--green); }
  .cb.checked::after { content: '✓'; font-size: 10px; color: #000; font-weight: 800; }
  .cb.inprogress { background: rgba(230,126,34,.2); border-color: var(--orange); }
  .cb.inprogress::after { content: '…'; font-size: 11px; color: var(--orange); font-weight: 800; line-height: 1; }

  .badge-cat {
    display: inline-flex; align-items: center;
    padding: 0 5px; border-radius: 4px;
    font-size: 9px; font-weight: 700; margin-left: 5px; vertical-align: middle;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .badge-cat.cat-prywatne { background: rgba(248,81,73,.15);   color: var(--red);    border: 1px solid rgba(248,81,73,.3);  }
  .badge-cat.cat-dp       { background: rgba(88,166,255,.15);  color: var(--blue);   border: 1px solid rgba(88,166,255,.3);  }
  .badge-cat.cat-vns      { background: rgba(230,126,34,.15);  color: var(--orange); border: 1px solid rgba(230,126,34,.3); }
  .badge-cat.cat-telegram { background: rgba(0,188,212,.15);   color: var(--cyan);   border: 1px solid rgba(0,188,212,.3);  }
  .badge-cat.cat-szpilki  { background: rgba(163,113,247,.15); color: var(--purple); border: 1px solid rgba(163,113,247,.3);}
  .badge-cat.cat-vibecoding{ background: rgba(163,113,247,.15);color: var(--purple); border: 1px solid rgba(163,113,247,.3);}
  .badge-cat { cursor: pointer; }
  .badge-cat:hover { opacity: .75; }

  .item-text { flex: 1; line-height: 1.45; font-size: 12px; min-width: 0; }

  /* DATE HIGHLIGHT */
  .date-tag {
    display: inline-block;
    background: rgba(210,153,34,.18); color: var(--yellow);
    border: 1px solid rgba(210,153,34,.35);
    padding: 0 5px; border-radius: 4px;
    font-size: 10px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    vertical-align: middle; margin: 0 2px;
  }
  .date-tag.soon    { background: rgba(210,153,34,.2);  color: var(--yellow); border-color: rgba(210,153,34,.45); }
  .date-tag.today   { background: rgba(230,126,34,.22); color: var(--orange); border-color: rgba(230,126,34,.45); }
  .date-tag.overdue { background: rgba(248,81,73,.2);   color: var(--red);    border-color: rgba(248,81,73,.45); }
  .date-tag.future  { background: rgba(63,185,80,.15);  color: var(--green);  border-color: rgba(63,185,80,.35); }

  .badge-p {
    display: inline-flex; align-items: center;
    background: rgba(188,140,255,.15); color: var(--purple);
    border: 1px solid rgba(188,140,255,.3);
    padding: 0 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700; margin-left: 6px; vertical-align: middle;
  }

  .completed-time {
    font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    margin-left: 7px; vertical-align: middle; opacity: .65;
  }

  /* PRIORITY / EDIT / DELETE / NOTE BUTTONS */
  .btn-priority {
    background: none; border: none; cursor: pointer; flex-shrink: 0;
    font-size: 15px; padding: 0 2px; line-height: 1;
    color: var(--border); transition: color .15s, transform .12s;
  }
  .btn-priority:hover               { color: var(--yellow); transform: scale(1.15); }
  .btn-priority.active              { color: var(--yellow); }
  .btn-priority.active:hover        { transform: scale(1.2); }
  .item.is-priority                 { border-left: 2px solid rgba(210,153,34,.5); }
  .item.is-priority .item-text      { font-weight: 500; }

  .btn-more-item {
    display: none; background: none; border: none; cursor: pointer;
    font-size: 18px; padding: 0 4px; flex-shrink: 0; width: 28px; text-align: center;
    line-height: 1; color: var(--muted); transition: color .12s;
  }
  .btn-more-item:hover { color: var(--cyan); }
  .btn-edit-item, .btn-delete-item, .btn-note-item, .btn-progress-item, .btn-move-item, .btn-date-item {
    display: none; background: none; border: none; cursor: pointer;
    font-size: 13px; padding: 0 4px; flex-shrink: 0; width: 22px; text-align: center;
    line-height: 1; transition: color .12s;
  }
  .btn-edit-item         { color: var(--border); margin-left: auto; }
  .btn-delete-item       { color: var(--border); }
  .btn-note-item         { color: var(--border); }
  .btn-progress-item     { color: transparent; }
  .item:hover .btn-edit-item, .item.item-pinned .btn-edit-item           { display: block; color: var(--muted); }
  .item:hover .btn-delete-item, .item.item-pinned .btn-delete-item       { display: block; color: var(--muted); }
  .item:hover .btn-note-item, .item.item-pinned .btn-note-item           { display: block; color: var(--muted); }
  .item:hover .btn-progress-item, .item.item-pinned .btn-progress-item   { display: block; color: var(--muted); }
  .item:hover .btn-move-item, .item.item-pinned .btn-move-item           { display: block; color: var(--muted); }
  .item:hover .btn-date-item, .item.item-pinned .btn-date-item           { display: block; color: var(--muted); }
  .btn-date-item:hover { color: var(--yellow) !important; }
  .date-menu {
    position: fixed; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,.4);
    display: flex; flex-direction: column; gap: 3px; min-width: 160px;
  }
  .date-menu button {
    background: none; border: none; color: var(--text); padding: 6px 10px; border-radius: 5px;
    cursor: pointer; text-align: left; font-size: 12px; white-space: nowrap;
  }
  .date-menu button:hover { background: var(--surface); color: var(--yellow); }
  .date-menu input[type=date] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 5px 8px; font-size: 12px; margin-top: 2px;
  }
  .btn-note-item.has-note         { display: block; color: var(--blue); }
  .btn-progress-item.is-active    { display: block !important; color: var(--green) !important; }
  .btn-edit-item:hover     { color: var(--cyan)   !important; }
  .btn-delete-item:hover   { color: var(--red)    !important; }
  .btn-note-item:hover     { color: var(--blue)   !important; }
  .item:hover .btn-progress-item  { color: var(--muted); }
  .btn-progress-item:hover { color: var(--green) !important; }
  .btn-progress-item.is-active:hover { color: var(--muted) !important; }
  .btn-move-item { color: var(--border); display: none; }
  .item:hover .btn-move-item { display: block; color: var(--muted); }
  .btn-move-item:hover { color: var(--cyan) !important; }
  .move-menu {
    position: fixed; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,.4);
    display: flex; flex-direction: column; gap: 2px; min-width: 130px;
  }
  .move-menu button {
    background: none; border: none; color: var(--text); padding: 6px 10px; border-radius: 5px;
    cursor: pointer; text-align: left; font-size: 12px; white-space: nowrap;
  }
  .move-menu button:hover { background: var(--surface); color: var(--cyan); }

  /* ── Spotkania ── */
  .meeting-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 10px; padding: 10px; }
  .meeting-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: default; transition: border-color .15s; position: relative; }
  .meeting-card:hover { border-color: var(--purple); }
  .meeting-avatar { width: 42px; height: 42px; border-radius: 50%; background: rgba(163,113,247,.2); border: 2px solid rgba(163,113,247,.4); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--purple); margin-bottom: 8px; }
  .meeting-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .meeting-typ { display: inline-flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
  .meeting-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .meeting-badge.prywatne { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
  .meeting-badge.biznes   { background: rgba(88,166,255,.15); color: var(--blue); border: 1px solid rgba(88,166,255,.3); }
  .meeting-note { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .meeting-date { font-size: 11px; color: var(--cyan); margin-top: 5px; }
  .meeting-actions { display: flex; gap: 4px; margin-top: 10px; }
  .meeting-btn { flex: 1; background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: 10px; padding: 4px; cursor: pointer; font-family: inherit; transition: all .12s; }
  .meeting-btn:hover { border-color: var(--cyan); color: var(--text); }
  .meeting-btn.done-btn:hover { border-color: var(--green); color: var(--green); }
  .meeting-btn.del-btn:hover  { border-color: var(--red);   color: var(--red);   }
  .meeting-sec-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 8px 10px 4px; }
  .new-meeting-form { padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; border-top: 1px solid var(--border); margin-top: 4px; }
  .new-meeting-form input, .new-meeting-form select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none;
  }
  .new-meeting-form input:focus, .new-meeting-form select:focus { border-color: var(--purple); }
  .new-meeting-form .btn-add-meeting { background: rgba(163,113,247,.15); border: 1px solid rgba(163,113,247,.4); color: var(--purple); border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .new-meeting-form .btn-add-meeting:hover { background: rgba(163,113,247,.25); }

  /* NOTE AREA */
  .note-row {
    flex-basis: 100%; width: 100%;
    display: flex; padding-left: 76px; padding-top: 4px;
  }
  .note-area {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 6px 9px; color: var(--muted);
    font-family: inherit; font-size: 11px; outline: none; resize: vertical;
    transition: border-color .15s; line-height: 1.5;
  }
  .note-area:focus { border-color: var(--blue); color: var(--text); }
  .note-area::placeholder { color: var(--border); }

  /* ITEM EXPAND */
  .item.is-expanded { border-color: rgba(57,208,200,.2) !important; background: rgba(57,208,200,.03); }
  .item-detail {
    flex-basis: 100%; width: 100%;
    padding: 6px 8px 4px 76px;
    display: flex; flex-direction: column; gap: 6px;
  }
  /* SUBTASKS */
  .subtask-section { display: flex; flex-direction: column; gap: 4px; }
  .subtask-header { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 2px 0; }
  .subtask-progress-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .subtask-progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width .3s; }
  .subtask-count { font-family: 'JetBrains Mono', monospace; color: var(--cyan); }
  .subtask-item { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1px solid rgba(48,54,61,.5); }
  .subtask-item:last-child { border-bottom: none; }
  .st-cb { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .st-cb:hover { border-color: var(--green); }
  .st-cb.st-done { background: var(--green); border-color: var(--green); }
  .st-cb.st-done::after { content: '✓'; font-size: 9px; color: #000; font-weight: 900; }
  .st-text { flex: 1; font-size: 12px; color: var(--text); line-height: 1.4; }
  .st-text.st-done { text-decoration: line-through; color: var(--muted); }
  .st-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 12px; padding: 0 3px; transition: color .12s; }
  .st-del:hover { color: var(--red); }
  .subtask-add-row { display: flex; gap: 6px; margin-top: 4px; }
  .subtask-add-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; color: var(--text); font-family: inherit; font-size: 12px; outline: none; }
  .subtask-add-input:focus { border-color: var(--cyan); }
  .subtask-add-input::placeholder { color: var(--border); }
  .subtask-add-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--cyan); background: rgba(57,208,200,.1); color: var(--cyan); font-size: 11px; font-weight: 700; cursor: pointer; }
  .st-badge-inline { display: inline-flex; align-items: center; gap: 4px; margin-left: 6px; font-size: 10px; color: var(--green); font-family: 'JetBrains Mono', monospace; vertical-align: middle; }
  @media (max-width: 640px) { .item-detail { padding-left: 36px; } }

  /* EXPORT/IMPORT */
  .search-row { display: none; }
  .io-row { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 12px; }
  .btn-io {
    padding: 5px 11px; border-radius: 7px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    background: var(--surface2); color: var(--muted); transition: all .15s;
  }
  .btn-io:hover { color: var(--text); border-color: var(--cyan); }
  #import-file { display: none; }

  .item.editing {
    background: rgba(57,208,200,.04);
    border: 1px solid var(--cyan) !important;
    border-radius: 8px; flex-wrap: wrap; gap: 0;
    padding: 10px 12px; align-items: flex-start;
  }
  .item-edit-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .item-edit-text {
    width: 100%; background: var(--surface2); border: 1px solid var(--cyan);
    border-radius: 6px; padding: 7px 10px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none; resize: none;
  }
  .item-edit-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .btn-save-edit {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--green);
    background: rgba(63,185,80,.12); color: var(--green); font-size: 11px;
    font-weight: 700; cursor: pointer; font-family: inherit; transition: background .12s;
  }
  .btn-save-edit:hover { background: rgba(63,185,80,.22); }
  .btn-cancel-edit {
    padding: 5px 9px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--muted); font-size: 11px;
    cursor: pointer; font-family: inherit; transition: background .12s;
  }
  .btn-cancel-edit:hover { background: var(--surface2); color: var(--text); }

  .empty-zone { padding: 10px; text-align: center; font-size: 11px; color: var(--border); border: 1.5px dashed var(--border); border-radius: 6px; margin: 3px; }
  .drag-target .empty-zone { border-color: var(--cyan); color: var(--cyan); }

  /* ADD FORM */
  .add-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
    display: none; flex-direction: column; gap: 10px;
  }
  .add-form.open { display: flex; }
  .add-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 12px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  .add-input:focus { border-color: var(--cyan); }
  .add-input::placeholder { color: var(--muted); }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .add-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 10px; color: var(--text);
    font-family: inherit; font-size: 12px; outline: none; cursor: pointer;
    transition: border-color .15s;
  }
  .add-select:focus { border-color: var(--cyan); }
  .add-date {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none;
    width: 150px; transition: border-color .15s; cursor: pointer;
    color-scheme: dark;
  }
  .add-date:focus { border-color: var(--yellow); }
  .add-date::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }
  .toggle-pawel { display: none !important; }
  ._toggle-pawel-placeholder {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); user-select: none; transition: all .15s;
  }
  .toggle-pawel.active { color: var(--purple); border-color: rgba(188,140,255,.4); background: rgba(188,140,255,.08); }
  .toggle-pawel input { display: none; }
  .btn-add {
    margin-left: auto; padding: 6px 16px; border-radius: 7px;
    border: 1px solid var(--cyan); font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit; background: rgba(57,208,200,.1);
    color: var(--cyan); transition: all .15s;
  }
  .btn-add:hover { background: rgba(57,208,200,.2); }
  .btn-add:active { transform: scale(.97); }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; opacity: 0; transform: translateY(6px); transition: all .22s; pointer-events: none; z-index: 999; }
  .toast.undo-toast { background: var(--blue); color: #fff; }
  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── BOTTOM SHEET (mobile action menu) ── */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 500;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .15s;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .sheet {
    background: var(--surface); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 520px;
    padding: 10px 0 env(safe-area-inset-bottom,16px);
    animation: slideUp .2s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 12px; }
  .sheet-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 0 20px 10px; }
  .sheet-actions { display: flex; flex-direction: column; }
  .sheet-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 20px; font-size: 15px; font-family: inherit;
    background: none; border: none; color: var(--text);
    cursor: pointer; text-align: left; transition: background .1s;
    border-top: 1px solid var(--border);
  }
  .sheet-btn:first-child { border-top: none; }
  .sheet-btn:active { background: var(--surface2); }
  .sheet-btn .sh-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .sheet-btn.sh-danger { color: var(--red); }
  .sheet-btn.sh-active { color: var(--yellow); }

  /* ── BOTTOM NAV BAR (mobile) ── */
  .mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 4px env(safe-area-inset-bottom,6px);
    z-index: 200; justify-content: space-around; align-items: center;
  }
  .mnav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: inherit; padding: 6px 12px; border-radius: 8px; transition: color .15s;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    min-width: 56px;
  }
  .mnav-btn .mn-icon { font-size: 20px; line-height: 1; }
  .mnav-btn.active { color: var(--cyan); }
  .mnav-btn:active { background: var(--surface2); }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    body {
      padding: calc(env(safe-area-inset-top,0px) + 10px) 0 calc(env(safe-area-inset-bottom,0px) + 62px);
      font-size: 14px;
    }

    .container { padding: 0 10px; }

    /* TABS — ukryte, bottom nav zastępuje */
    .proj-tabs { display: none !important; }

    /* HEADER — kompaktowy, tylko tytuł + status */
    .header { margin: 10px 0 8px; text-align: left; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 16px; margin: 0; }
    .header p  { font-size: 11px; margin: 0; margin-left: auto; }

    /* STATS — jedna pozioma listwa */
    .overview {
      display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .overview::-webkit-scrollbar { display: none; }
    .stat-card {
      flex: 0 0 auto; min-width: 70px; padding: 7px 10px;
      display: flex; align-items: center; gap: 6px; text-align: left;
    }
    .stat-value { font-size: 18px; margin: 0; }
    .stat-label { font-size: 9px; white-space: nowrap; }

    /* PROGRESS — schowany na mobile */
    .main-progress { display: none; }

    /* ACTIONS — poziomy scroll */
    .actions {
      flex-wrap: nowrap; overflow-x: auto; gap: 5px; margin-bottom: 8px;
      padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .actions::-webkit-scrollbar { display: none; }
    .btn { font-size: 11px; padding: 7px 11px; white-space: nowrap; flex-shrink: 0; }

    /* FILTRY — poziomy scroll */
    .filter-bar {
      flex-wrap: nowrap; overflow-x: auto; gap: 5px; margin-bottom: 8px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-label { display: none; }
    .btn-filter { font-size: 11px; padding: 6px 12px; white-space: nowrap; flex-shrink: 0; border-radius: 20px; }
    .search-inline { display: none !important; }
    .search-row { display: block; margin-bottom: 8px; }

    /* WEEK VIEW */
    .week-view { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .week-grid { grid-template-columns: repeat(7, minmax(72px,1fr)); min-width: 504px; }
    .week-col-hd { font-size: 9px; padding: 4px; }
    .week-item  { font-size: 9px; }

    /* SEKCJE */
    .section { margin-bottom: 8px; border-radius: 10px; }
    .sec-header { font-size: 11px; padding: 10px 12px; letter-spacing: .05em; }
    .sec-count  { font-size: 10px; }
    .sec-body   { padding: 4px; }

    /* QUADRANTY */
    .q-header { padding: 9px 12px; font-size: 10px; }
    .q-desc   { display: none; }
    .q-body   { padding: 3px; }

    /* ITEMY — duże, czyste */
    .item { padding: 13px 8px; gap: 10px; flex-wrap: nowrap; align-items: center; }
    .sel-cb { display: none; }
    .cb   { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; border-width: 2px; }
    .cb.checked::after  { font-size: 14px; }
    .cb.inprogress::after { font-size: 15px; line-height: 24px; }
    .num  { display: none; }
    .drag-handle { display: none; }
    .item-text  { font-size: 14px; line-height: 1.45; }
    .badge-cat  { font-size: 9px; padding: 1px 5px; }
    .date-tag   { font-size: 10px; }

    /* Na mobile: tylko ★ i ⋯ */
    .btn-edit-item, .btn-delete-item, .btn-note-item,
    .btn-progress-item, .btn-move-item, .btn-date-item { display: none !important; }
    .btn-priority { font-size: 18px; flex-shrink: 0; color: var(--border); padding: 0; }
    .btn-priority.active { color: var(--yellow); }
    .btn-more-item { display: flex !important; align-items: center; justify-content: center; color: var(--muted); font-size: 20px; width: 30px; }

    .note-row { padding-left: 36px; }
    .note-area { font-size: 13px; }

    /* FORMULARZ DODAWANIA */
    .add-form   { padding: 12px 10px; gap: 8px; border-radius: 12px; }
    .add-input  { font-size: 15px; padding: 12px 12px; border-radius: 10px; }
    .add-row    { flex-direction: column; gap: 7px; }
    .add-select { width: 100%; padding: 10px 10px; font-size: 13px; border-radius: 8px; }
    .add-date   { width: 100%; padding: 10px 10px; font-size: 13px; border-radius: 8px; }
    .btn-add    { width: 100%; margin-left: 0; padding: 13px; font-size: 14px; font-weight: 700; border-radius: 10px; }
    .btn-mic    { width: 46px; height: 46px; font-size: 20px; border-radius: 10px; }

    /* IO ROW + LOG — ukryte */
    .io-row     { display: none; }
    .log-panel  { display: none; }

    /* DONE SUBS */
    .done-sub-hd { font-size: 10px; padding: 8px 10px; }

    /* VOICE FAB */
    .voice-fab    { bottom: 72px; right: 14px; width: 46px; height: 46px; font-size: 20px; }
    .voice-status { bottom: 128px; right: 14px; max-width: calc(100vw - 28px); }

    /* EDIT MODE */
    .item-edit-text  { font-size: 14px; }
    .item-edit-row   { flex-direction: column; gap: 6px; }
    .item-edit-row .add-select { width: 100%; }
    .item-edit-row .add-date   { width: 100%; }
    .btn-save-edit, .btn-cancel-edit { width: 100%; padding: 11px; font-size: 13px; text-align: center; border-radius: 8px; }

    /* TOAST */
    .toast { bottom: 72px; right: 10px; left: 10px; text-align: center; font-size: 13px; }

    /* BOTTOM NAV */
    .mobile-nav { display: flex; }

    /* CAL MODAL */
    .cal-modal { border-radius: 18px 18px 0 0; position: fixed; bottom: 0; left: 0; right: 0; max-height: 80vh; }
    .cal-overlay { align-items: flex-end; }
  }

  /* MIC BUTTON */
  .btn-mic {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .btn-mic:hover { border-color: var(--cyan); color: var(--text); }
  .btn-mic.recording {
    border-color: var(--red); background: rgba(248,81,73,.15); color: var(--red);
    animation: mic-pulse 1s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,.4); }
    50%       { box-shadow: 0 0 0 6px rgba(248,81,73,.0); }
  }

  /* VOICE FAB + STATUS */
  .voice-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface2);
    color: var(--muted); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.5); transition: all .2s;
  }
  .voice-fab:hover { border-color: var(--cyan); color: var(--cyan); transform: scale(1.08); }
  .voice-fab.cmd-on {
    border-color: var(--red); color: #fff; background: var(--red);
    animation: fab-pulse 1.1s ease-in-out infinite;
  }
  @keyframes fab-pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,.5), 0 0 0 0 rgba(248,81,73,.5); }
    50%      { box-shadow: 0 4px 20px rgba(0,0,0,.5), 0 0 0 12px rgba(248,81,73,0); }
  }
  .voice-status {
    position: fixed; bottom: 84px; right: 24px; z-index: 99;
    max-width: 270px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35); display: none;
  }
  .voice-status.on { display: block; }
  .vs-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
  .vs-txt { font-size: 12px; color: var(--cyan); font-weight: 500; min-height: 16px; }
  .vs-hint { font-size: 10px; color: var(--border); margin-top: 6px; line-height: 1.5; }

  /* LOG PANEL */
  .log-panel { margin-top: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .log-hd {
    display: flex; align-items: center; gap: 8px; padding: 9px 14px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); cursor: pointer; user-select: none;
    background: var(--surface2); border-bottom: 1px solid var(--border); transition: background .12s;
  }
  .log-hd:hover { background: #2d333b; }
  .log-panel.lp-col .log-hd { border-bottom-color: transparent; }
  .log-panel.lp-col .log-body { display: none; }
  .log-chev { margin-left: auto; font-size: 10px; transition: transform .2s; }
  .log-panel.lp-col .log-chev { transform: rotate(-90deg); }
  .log-cnt-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1px 7px; font-size: 10px; }
  .log-body { padding: 4px; max-height: 200px; overflow-y: auto; }
  .log-entry { display: flex; align-items: flex-start; gap: 8px; padding: 5px 8px; border-radius: 5px; font-size: 11px; line-height: 1.4; }
  .log-entry:hover { background: var(--surface2); }
  .log-icon { flex-shrink: 0; font-size: 13px; }
  .log-txt  { flex: 1; color: var(--text); }
  .log-ts   { flex-shrink: 0; font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono',monospace; white-space: nowrap; }
  .log-empty { text-align: center; padding: 14px; font-size: 11px; color: var(--border); }

  /* CALENDAR */
  .cal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:flex; align-items:center; justify-content:center; }
  .cal-modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; width:min(520px,95vw); max-height:90vh; overflow-y:auto; }
  .cal-header { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .cal-title { flex:1; text-align:center; font-size:14px; font-weight:700; color:var(--text); }
  .cal-nav,.cal-close { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; color:var(--muted); cursor:pointer; font-size:14px; transition:all .12s; }
  .cal-nav:hover,.cal-close:hover { color:var(--text); border-color:var(--cyan); }
  .cal-days-hd { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:4px; }
  .cal-day-lbl { text-align:center; font-size:10px; color:var(--muted); font-weight:600; padding:4px 0; text-transform:uppercase; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-cell { min-height:60px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:4px; }
  .cal-cell.today { border-color:var(--orange); background:rgba(230,126,34,.06); }
  .cal-cell.other-month { opacity:.35; }
  .cal-cell-num { font-size:10px; font-weight:700; color:var(--muted); margin-bottom:2px; font-family:'JetBrains Mono',monospace; }
  .cal-cell.today .cal-cell-num { color:var(--orange); }
  .cal-task { font-size:9px; padding:1px 4px; border-radius:3px; margin-bottom:1px; background:rgba(57,208,200,.15); color:var(--cyan); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:default; }
  .cal-task.done { background:rgba(63,185,80,.12); color:var(--green); text-decoration:line-through; }
  .cal-task.inprogress { background:rgba(230,126,34,.15); color:var(--orange); }

  /* BULK TOOLBAR */
  .item.selected { background:rgba(57,208,200,.08) !important; border-color:var(--cyan) !important; }
  .bulk-toolbar { display:none !important; }
  .bulk-count { font-size:12px; font-weight:700; color:var(--cyan); }
  .btn-bulk { padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .12s; }

function itemToRow(item, proj) {
  return {
    id: item.id, project: proj,
    sec: item.sec, quad: item.quad || null, text: item.text,
    checked: item.checked || false, in_progress: item.inProgress || false,
    priority: item.priority || false, pawel: item.pawel || false,
    cat: item.cat || null, note: item.note || '',
    completed_at: item.completedAt || null,
    prev_sec: item._prevSec || null, prev_quad: item._prevQuad || null,
  };
}

function rowToItem(row) {
  return {
    id: row.id, sec: row.sec, quad: row.quad, text: row.text,
    checked: row.checked, inProgress: row.in_progress,
    priority: row.priority, pawel: row.pawel,
    cat: row.cat, note: row.note || '',
    completedAt: row.completed_at,
    _prevSec: row.prev_sec, _prevQuad: row.prev_quad,
  };
}

async function sbFetch(projectKey) {
  try {
    const { data, error } = await sb.from('tasks').select('*').eq('project', projectKey);
    if (error) throw error;
    return data.map(rowToItem);
  } catch(e) { console.warn('sbFetch', e); return null; }
}

async function sbSave(projectItems, projectKey) {
  if (!projectItems.length) return;
  try {
    await sb.from('tasks').upsert(projectItems.map(i => itemToRow(i, projectKey)), { onConflict: 'id' });
  } catch(e) { console.warn('sbSave', e); }
}

async function sbDelete(id) {
  try { await sb.from('tasks').delete().eq('id', id); } catch(e) {}
}

async function syncFromSupabase() {
  try {
    if (activeProject === 'general') {
      const results = await Promise.all(CAT_PROJECTS.map(k => sbFetch(k)));
      const merged = [];
      CAT_PROJECTS.forEach((catKey, i) => {
        const src = results[i] || loadCatItems(catKey);
        src.forEach(item => { if (!item.cat) item.cat = catKey; merged.push(item); });
      });
      items = merged;
    } else if (activeProject !== 'projekty') {
      const remote = await sbFetch(activeProject);
      if (remote && remote.length) items = remote;
    } else return;
    render();
    const sbEl = document.getElementById('sb-status');
    if (sbEl) sbEl.innerHTML = '<span style="color:var(--green)">☁ online</span>';
  } catch(e) {
    const sbEl = document.getElementById('sb-status');
    if (sbEl) sbEl.innerHTML = '<span style="color:var(--red)">☁ offline</span>';
  }
}

function loadCatItems(catKey) {
  const proj = PROJECTS[catKey];
  let catItems = JSON.parse(JSON.stringify(proj.defaultItems));
  try {
    const raw = localStorage.getItem(proj.storageKey);
    if (raw) { const s = JSON.parse(raw); if (s.items) catItems = s.items; }
  } catch(e) {}
  catItems.forEach(i => {
    if (!i.cat)        i.cat        = catKey;
    if (!i.inProgress) i.inProgress = false;
    if (!i.note)       i.note       = '';
    if (i.priority === undefined) i.priority = false;
  });
  return catItems;
}

    const state = { _saved: new Date().toISOString(), items: catItems };
    localStorage.setItem(PROJECTS[catKey].storageKey, JSON.stringify(state));
  });
}

//  UNDO HISTORY (trwałe — przeżywa F5)
// ════════════════════════════════════════
const MAX_HISTORY = 50;
let undoStack = [];

function undoKey() { return PROJECTS[activeProject].storageKey + '-undo'; }
function logKey()  { return PROJECTS[activeProject].storageKey + '-log'; }

function saveUndoStack() {
  try { localStorage.setItem(undoKey(), JSON.stringify(undoStack)); } catch(e) {}
}
function loadUndoStack() {
  try { const r = localStorage.getItem(undoKey()); if (r) undoStack = JSON.parse(r); }
  catch(e) { undoStack = []; }
}

function snapshot() {
  return JSON.stringify({
    items: JSON.parse(JSON.stringify(items)),
    secs:  sections.map(s => ({ id: s.id, collapsed: s.collapsed })),
    qc:    { ...QUADS_COLLAPSED },
    dc:    { ...DONE_SUBS_COLLAPSED },
  });
}

function pushHistory() {
  undoStack.push(snapshot());
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  saveUndoStack();
}

function undo() {
  if (!undoStack.length) return;
  const state = JSON.parse(undoStack.pop());
  items = state.items;
  state.secs.forEach(ss => { const s = sections.find(x => x.id === ss.id); if (s) s.collapsed = ss.collapsed; });
  Object.assign(QUADS_COLLAPSED, state.qc);
  Object.assign(DONE_SUBS_COLLAPSED, state.dc);
  saveUndoStack();
  render();
  showToast('↩ Cofnięto', true);
  logAction('↩', 'Cofnięto akcję');
}

//  DATE UTILS
// ════════════════════════════════════════
const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
function todayISO() { return TODAY.toISOString().slice(0,10); }

function pickerToDisplay(isoDate) {
  if (!isoDate) return '';
  const [yr, mo, d] = isoDate.split('-');
  return +yr === TODAY.getFullYear() ? `${d}.${mo}` : `${d}.${mo}.${yr}`;
}

function parseDate(str) {
  const m = str.match(/^(\d{1,2})[.\/-](\d{2})(?:[.\/-](\d{2,4}))?$/);
  if (!m) return null;
  let yr = m[3] ? (m[3].length === 2 ? 2000 + +m[3] : +m[3]) : TODAY.getFullYear();
  const dt = new Date(yr, +m[2] - 1, +m[1]);
  dt.setHours(0, 0, 0, 0);
  return dt;
}

const DAY_SHORT = ['niedz', 'pon', 'wt', 'śr', 'czw', 'pt', 'sob'];

function highlightDates(text) {
  return escHtml(text).replace(
    /\d{1,2}[.\/-]\d{2}(?:[.\/-]\d{2,4})?|\d{1,2}:\d{2}/g,
    match => {
      const dt = parseDate(match);
      let cls = 'date-tag';
      let label = match;
      if (dt) {
        const diffDays = Math.round((dt - TODAY) / 86400000);
        if      (diffDays < 0)   cls += ' overdue';
        else if (diffDays === 0) cls += ' today';
        else if (diffDays <= 3)  cls += ' soon';
        else                     cls += ' future';
        const dayName = DAY_SHORT[dt.getDay()];
        let counter = '';
        if      (diffDays === 0)  counter = ' dziś';
        else if (diffDays > 0)    counter = ` za ${diffDays}d`;
        else                      counter = ` ${Math.abs(diffDays)}d temu`;
        label = `${match} ${dayName}${counter}`;
      }
      return `<span class="${cls}">${label}</span>`;
    }
  );
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTs(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2,'0');
  const mon = String(d.getMonth()+1).padStart(2,'0');
  const h   = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${day}.${mon} ${h}:${min}`;
}

function getItemDate(item) {
  const notePart = parseItemNote(item).notePart;
  const m = notePart.match(/📅\s*(\d{1,2}\.\d{2}(?:\.\d{2,4})?)/);
  return m ? parseDate(m[1]) : null;
}
function getItemDateStr(item) {
  const notePart = parseItemNote(item).notePart;
  const m = notePart.match(/📅\s*(\d{1,2}\.\d{2}(?:\.\d{2,4})?)/);
  return m ? m[1] : null;
}

function parseItemNote(item) {
  const raw = item.note || '';
  const MARKER = '\n---subtasks---\n';
  const idx = raw.indexOf(MARKER);
  if (idx === -1) return { notePart: raw, subtasks: [] };
  const notePart = raw.slice(0, idx);
  try { return { notePart, subtasks: JSON.parse(raw.slice(idx + MARKER.length)) }; }
  catch(e) { return { notePart: raw, subtasks: [] }; }
}

function buildItemNote(notePart, subtasks) {
  const clean = (notePart || '').replace(/\n---subtasks---\n[\s\S]*$/, '').trimEnd();
  if (!subtasks || !subtasks.length) return clean;
  return clean + '\n---subtasks---\n' + JSON.stringify(subtasks);
}

function setFilter(f) {
  if (activeFilter === f) f = 'all';
  activeFilter = f;
  ['all','priority','today','overdue','inprogress','prywatne','firmowe','dop','projekty'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.classList.toggle('active', k === f);
  });
  render();
}

function applyFilter(list) {
  if (activeFilter === 'all')        return list;
  if (activeFilter === 'priority')   return list.filter(i => i.priority);
  if (activeFilter === 'pawel')      return list.filter(i => i.pawel);
  if (activeFilter === 'inprogress') return list.filter(i => i.inProgress);
  if (activeFilter === 'prywatne')   return list.filter(i => i.cat === 'prywatne');
  if (activeFilter === 'firmowe')    return list.filter(i => i.cat === 'firmowe');
  if (activeFilter === 'dop')        return list.filter(i => i.cat === 'dop');
  if (activeFilter === 'projekty')   return list.filter(i => i.cat === 'projekty');
  if (activeFilter === 'today') {
    return list.filter(i => {
      const dt = getItemDate(i);
      return dt && dt.getTime() === TODAY.getTime();
    });
  }
  if (activeFilter === 'overdue') {
    return list.filter(i => {
      const dt = getItemDate(i);
      return dt && dt < TODAY && !i.checked;
    });
  }
  return list;
}

function setSearch(val) {
  activeSearch = val.trim().toLowerCase();
  const other = val === document.getElementById('search-input')?.value
    ? document.getElementById('search-input-mobile')
    : document.getElementById('search-input');
  if (other && other.value !== val) other.value = val;
  render();
}

function applySearch(list) {
  if (!activeSearch) return list;
  return list.filter(i => i.text.toLowerCase().includes(activeSearch) || parseItemNote(i).notePart.toLowerCase().includes(activeSearch));
}

function toggleWeekView() {
  weekViewOpen = !weekViewOpen;
  document.getElementById('btn-week').classList.toggle('active', weekViewOpen);
  render();
}

function renderWeekView() {
  const card = document.getElementById('week-view-card');
  if (!weekViewOpen) { card.className = 'week-view'; card.innerHTML = ''; return; }
  card.className = 'week-view open';

  const dow = TODAY.getDay();
  const monday = new Date(TODAY);
  monday.setDate(TODAY.getDate() - (dow === 0 ? 6 : dow - 1));

  const days = Array.from({length:7}, (_, i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i); return d;
  });

  const fmt = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
  const DAY_NAMES = ['Pon','Wt','Śr','Czw','Pt','Sob','Niedz'];

  card.innerHTML = `
    <div class="week-view-hd">
      <span class="week-view-title">📅 Tydzień ${fmt(monday)} – ${fmt(days[6])}</span>
    </div>
    <div class="week-grid" id="week-grid"></div>
  `;

  const grid = card.querySelector('#week-grid');
  days.forEach((day, i) => {
    const isToday   = day.getTime() === TODAY.getTime();
    const isOverdue = day < TODAY;
    const dayItems  = items.filter(it => {
      if (it.checked || it.sec !== 'todo') return false;
      const dt = getItemDate(it);
      return dt && dt.getTime() === day.getTime();
    });

    const col = document.createElement('div');
    col.className = 'week-col' + (isToday ? ' wc-today' : isOverdue ? ' wc-overdue' : '');
    col.innerHTML = `
      <div class="week-col-hd">${DAY_NAMES[i]}<small>${fmt(day)}</small></div>
      <div class="week-col-body">
        ${dayItems.length === 0
          ? '<div class="week-no-items">—</div>'
          : dayItems.map(it => `<div class="week-item ${it.priority?'wi-priority':''} ${it.pawel?'wi-pawel':''}" title="${escHtml(it.text)}">${escHtml(it.text.replace(/\s*[—–-]\s*\d{1,2}[.\/-]\d{2}.*$/,'').trim())}</div>`).join('')}
      </div>
    `;
    grid.appendChild(col);
  });
}

    <button class="btn-add-meeting" onclick="addMeeting()">+ Dodaj</button>`;
  wrap.appendChild(form);
}

function addMeeting(name, typ, dateStr, note) {
  const nm = name || document.getElementById('nm-name')?.value.trim();
  if (!nm) { document.getElementById('nm-name')?.focus(); return; }
  const t = typ  || document.getElementById('nm-typ')?.value  || 'prywatne';
  const d = dateStr || (()=>{ const v=document.getElementById('nm-date')?.value; if(!v) return ''; const dt=new Date(v); return (dt.getDate()).toString().padStart(2,'0')+'.'+(dt.getMonth()+1).toString().padStart(2,'0'); })();
  const n = note || document.getElementById('nm-note')?.value.trim() || '';
  const row = {
    id: crypto.randomUUID(), project:'spotkania', sec:'todo', quad:'q2',
    text: nm, checked:false, in_progress:false, priority:false, pawel:false,
    cat: t, note: (d ? '📅'+d+'\n' : '') + n, completed_at:null, prev_sec:null, prev_quad:null,
  };
  sb.table('tasks').insert(row).catch(e => console.warn(e));
  items.push({ id:row.id, sec:'todo', quad:'q2', text:nm, checked:false, inProgress:false, priority:false, pawel:false, cat:t, note:row.note, completedAt:null, _prevSec:null, _prevQuad:null });
  renderSpotkania();
  if (document.getElementById('nm-name')) {
    document.getElementById('nm-name').value = '';
    document.getElementById('nm-date').value = '';
    document.getElementById('nm-note').value = '';
  }
}

function moveMeeting(id, targetSec) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.sec = targetSec;
  item.checked = targetSec === 'done';
  sb.table('tasks').update({sec: targetSec, checked: item.checked}).eq('id', id).catch(e => console.warn(e));
  renderSpotkania();
}

function deleteMeeting(id) {
  items = items.filter(i => i.id !== id);
  sb.table('tasks').delete().eq('id', id).catch(e => console.warn(e));
  renderSpotkania();
}

function render() {
  if (activeProject === 'projekty') { renderProjectsView(); return; }
  if (activeProject === 'spotkania') { renderSpotkania(); return; }

  renderWeekView();

  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';

  // ── Overdue block ──────────────────────────────────────────────────────────
  const overdue = items.filter(i => !i.checked && (() => { const dt = getItemDate(i); return dt && dt < TODAY; })());
  const makeOverdueBlock = () => {
    const od = document.createElement('div');
    od.className = 'section overdue-block';
    const hasItems = overdue.length > 0;
    od.style.cssText = hasItems
      ? 'border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.06)'
      : 'border-color:rgba(248,81,73,.2);opacity:.5';
    od.innerHTML = `<div class="sec-header" style="color:var(--red)">
      <span class="sec-chevron" style="${hasItems?'':'transform:rotate(-90deg)'}">▾</span>
      <span class="sec-title">${hasItems ? '🔴' : '✅'} Przeterminowane</span>
      ${hasItems ? `<span class="sec-count">${overdue.length}</span>` : ''}
    </div><div class="sec-body" style="${hasItems?'':'display:none'}" id="od-body"></div>`;
    if (hasItems) {
      const body = od.querySelector('#od-body');
      overdue.forEach((item, idx) => body.appendChild(makeItem(item, idx + 1)));
    }
    od.querySelector('.sec-header').addEventListener('click', () => {
      const chev = od.querySelector('.sec-chevron');
      const b = od.querySelector('.sec-body');
      const hidden = b.style.display === 'none';
      b.style.display = hidden ? '' : 'none';
      chev.style.transform = hidden ? '' : 'rotate(-90deg)';
    });
    return od;
  };
  if (overdue.length) wrap.insertBefore(makeOverdueBlock(), wrap.firstChild);
  else wrap._overdueBlock = makeOverdueBlock(); // append at end after sections render
  // ──────────────────────────────────────────────────────────────────────────

  // Back button when inside a sub-project
  if (projectsSubView) {
    const back = document.createElement('button');
    back.className = 'btn proj-back';
    back.innerHTML = '← Projekty';
    back.style.color = 'var(--purple)';
    back.onclick = () => switchProject('projekty');
    wrap.appendChild(back);
  }

  sections.forEach(sec => {
    const secItems = items.filter(i => i.sec === sec.id);
    const div = document.createElement('div');
    div.className = 'section' + (sec.collapsed ? ' collapsed' : '');
    div.id = 'sec-' + sec.id;

    const countLabel = sec.id === 'done'
      ? secItems.length
      : secItems.filter(i => !i.checked).length;

    div.innerHTML = `
      <div class="sec-header" onclick="toggleSection('${sec.id}',event)">
        <div class="sec-dot" style="background:${sec.color}"></div>
        ${sec.label}
        <span class="sec-count">${countLabel}</span>
        <span class="sec-chevron">▼</span>
      </div>
      <div class="sec-body" id="body-${sec.id}"></div>
    `;
    wrap.appendChild(div);

    if (!sec.collapsed) {
      const body = div.querySelector('.sec-body');
      if      (sec.id === 'todo') renderMatrix(body);
      else if (sec.id === 'done') renderDone(body);
      else                        renderFlatList(body, sec, secItems);
    }
  });

  if (wrap._overdueBlock) { wrap.appendChild(wrap._overdueBlock); delete wrap._overdueBlock; }

  updateStats();
}

// ── Quadrant toggle ──
function toggleQuad(qId) {
  pushHistory();
  QUADS_COLLAPSED[qId] = !QUADS_COLLAPSED[qId];
  render(); autoSave();
}

// ── Matrix ──
function renderMatrix(body) {
  const grid = document.createElement('div');
  grid.className = 'matrix';

  QUADS.forEach(q => {
    const raw = items.filter(i => i.sec === 'todo' && i.quad === q.id && !i.checked);
    const filtered = applySearch(applyFilter(raw)).sort((a, b) => {
      if (a.priority !== b.priority) return a.priority ? -1 : 1;
      const da = getItemDate(a), db = getItemDate(b);
      if (da && !db) return -1;
      if (!da && db) return 1;
      if (da && db) return da - db;
      return 0;
    });
    const collapsed = QUADS_COLLAPSED[q.id];

    const qEl = document.createElement('div');
    qEl.className = `quadrant ${q.cls}${collapsed ? ' q-collapsed' : ''}`;
    qEl.id = 'quad-' + q.id;

    const displayCount = activeFilter === 'all' ? raw.filter(i => !i.checked).length : filtered.length;

    qEl.innerHTML = `
      <div class="q-header" onclick="event.stopPropagation();toggleQuad('${q.id}')">
        <span class="q-icon">${q.icon}</span>
        ${q.label}
        <span class="q-desc">${q.desc}</span>
        <span class="q-count">${displayCount}</span>
        <span class="q-chevron">▼</span>
      </div>
      <div class="q-body" id="qbody-${q.id}"></div>
    `;
    grid.appendChild(qEl);

    if (!collapsed) {
      const qBody = qEl.querySelector('.q-body');
      if (filtered.length === 0) {
        qBody.innerHTML = `<div class="empty-zone">${activeFilter !== 'all' ? 'Brak dla wybranego filtru' : 'Przeciągnij tutaj'}</div>`;
      } else {
        filtered.forEach((item, idx) => qBody.appendChild(makeItem(item, idx+1)));
      }
      if (activeFilter === 'all') setupDropZone(qBody, 'todo', q.id, qEl);
    }
  });

  body.appendChild(grid);
}

// ── Flat list ──
function renderFlatList(body, sec, secItems) {
  const filtered = applySearch(applyFilter(secItems)).sort((a, b) => {
    if (sec.id === 'done') return 0;
    if (a.priority !== b.priority) return a.priority ? -1 : 1;
    const da = getItemDate(a), db = getItemDate(b);
    if (da && !db) return -1;
    if (!da && db) return 1;
    if (da && db) return da - db;
    return 0;
  });
  if (filtered.length === 0) {
    body.innerHTML = `<div class="empty-zone">${activeFilter !== 'all' ? 'Brak dla wybranego filtru' : 'Przeciągnij tutaj'}</div>`;
  } else {
    filtered.forEach((item, idx) => body.appendChild(makeItem(item, idx+1)));
  }
  if (activeFilter === 'all') setupDropZone(body, sec.id, null, document.getElementById('sec-'+sec.id));
}

// ── Done section with subsections ──
function renderDone(body) {
  const allDone = items.filter(i => i.checked);
  if (allDone.length === 0) {
    body.innerHTML = `<div class="empty-zone">Nic tu jeszcze nie trafiło</div>`;
    return;
  }

  DONE_SUBS.forEach(def => {
    const subItems = allDone.filter(i =>
      def.from === 'todo'
        ? (!i._prevSec || i._prevSec === 'todo')
        : i._prevSec === def.from
    );
    if (subItems.length === 0) return;

    const sorted = [...subItems].sort((a, b) => {
      if (!a.completedAt && !b.completedAt) return 0;
      if (!a.completedAt) return 1;
      if (!b.completedAt) return -1;
      return new Date(b.completedAt) - new Date(a.completedAt);
    });

    const collapsed = DONE_SUBS_COLLAPSED[def.id] ?? false;
    const subEl = document.createElement('div');
    subEl.className = 'done-sub' + (collapsed ? ' collapsed' : '');

    subEl.innerHTML = `
      <div class="done-sub-hd" onclick="event.stopPropagation();toggleDoneSub('${def.id}')">
        <div class="done-sub-dot" style="background:${def.color}"></div>
        ${def.label}
        <span class="done-sub-count">${sorted.length}</span>
        <span class="done-sub-chevron">▼</span>
      </div>
      <div class="done-sub-body"></div>
    `;
    body.appendChild(subEl);

    if (!collapsed) {
      const sb = subEl.querySelector('.done-sub-body');
      sorted.forEach((item, idx) => {
        const el = makeItem(item, idx+1);
        const ts = fmtTs(item.completedAt);
        if (ts) {
          const span = document.createElement('span');
          span.className = 'completed-time';
          span.textContent = ts;
          el.querySelector('.item-text').appendChild(span);
        }
        sb.appendChild(el);
      });
    }
  });
}

function toggleDoneSub(id) {
  pushHistory();
  DONE_SUBS_COLLAPSED[id] = !DONE_SUBS_COLLAPSED[id];
  render(); autoSave();
}

// ── Drop zone setup ──
function setupDropZone(el, secId, quadId, highlightEl) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    highlightEl.classList.add('drag-target');
  });
  el.addEventListener('dragleave', e => {
    if (!highlightEl.contains(e.relatedTarget)) highlightEl.classList.remove('drag-target');
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    highlightEl.classList.remove('drag-target');
    if (!dragState.id) return;
    const overItem = e.target.closest('.item');
    if (!overItem) moveItem(dragState.id, secId, quadId, null, false);
  });
}

// ── Make item element ──
function makeItem(item, num) {
  const el = document.createElement('div');
  el.dataset.id = item.id;

  // ── EDIT MODE ──
  if (editingId === item.id) {
    el.className = 'item editing';
    const curSec  = item.sec === 'done' ? (item._prevSec || 'todo') : item.sec;
    const curQuad = item.quad || 'q2';
    const quadVis = curSec === 'todo' ? '' : 'display:none';

    el.innerHTML = `
      <span class="num">${num}.</span>
      <div class="item-edit-wrap">
        <textarea class="item-edit-text" id="eit-${item.id}" rows="2">${escHtml(item.text)}</textarea>
        <div class="item-edit-row">
          <select class="add-select" id="eis-${item.id}" onchange="onEditSecChange('${item.id}')">
            <option value="todo"  ${curSec==='todo'  ?'selected':''}>📋 Do Zrobienia</option>
            <option value="ai"    ${curSec==='ai'    ?'selected':''}>🤖 Pytania do AI</option>
            <option value="pawel" ${curSec==='pawel' ?'selected':''}>👤 Pytania do Pawła</option>
          </select>
          <select class="add-select" id="eiq-${item.id}" style="${quadVis}">
            <option value="q1" ${curQuad==='q1'?'selected':''}>🔴 Pilne + Ważne</option>
            <option value="q2" ${curQuad==='q2'?'selected':''}>🟡 Ważne + Niepilne</option>
            <option value="q3" ${curQuad==='q3'?'selected':''}>🟠 Pilne + Nieważne</option>
            <option value="q4" ${curQuad==='q4'?'selected':''}>⚪ Niepilne + Nieważne</option>
          </select>
          <input class="add-date" id="eid-${item.id}" type="date" title="Dołącz datę do tekstu" onclick="try{this.showPicker()}catch(e){}">
          <label class="toggle-pawel ${item.pawel?'active':''}" id="eip-${item.id}" onclick="toggleEditPawel('${item.id}')">
            <input type="checkbox" ${item.pawel?'checked':''}> [P] Paweł
          </label>
          <button class="btn-mic" id="emic-${item.id}" onclick="event.stopPropagation();toggleEditMic('${item.id}')" title="Dyktuj">🎤</button>
          <button class="btn-save-edit"   onclick="event.stopPropagation();saveEdit('${item.id}')">✓ Zapisz</button>
          <button class="btn-cancel-edit" onclick="event.stopPropagation();closeEdit()">✕ Anuluj</button>
        </div>
      </div>
    `;

    const ta = el.querySelector('.item-edit-text');
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(item.id); }
      if (e.key === 'Escape') closeEdit();
    });
    return el;
  }

  // ── NORMAL MODE ──
  const noteOpen = openNotes.has(item.id);
  const { notePart, subtasks } = parseItemNote(item);
  const noteDisplay = notePart.replace(/📅\s*\d{1,2}\.\d{2}(?:\.\d{2,4})?\s*/g, '').trim();
  const hasNote = !!(noteDisplay);
  const hasSubtasks = subtasks.length > 0;
  const doneSubtasks = subtasks.filter(s => s.checked).length;

  const catLabels = { prywatne:'Prywatne', dp:'DOP', vns:'VNS', telegram:'Telegram', szpilki:'Szpilki', vibecoding:'Vibe' };
  el.className = 'item'
    + (item.checked    ? ' is-done'       : '')
    + (item.inProgress ? ' is-inprogress' : '')
    + (item.priority   ? ' is-priority'   : '')
    + (selectedIds.has(item.id) ? ' selected' : '')
    + (noteOpen        ? ' is-expanded'   : '');
  el.draggable = true;

  const cbCls = item.checked ? 'checked' : (item.inProgress ? 'inprogress' : '');
  const stBadge = hasSubtasks ? `<span class="st-badge-inline" title="Podzadania: ${doneSubtasks}/${subtasks.length}">▸ ${doneSubtasks}/${subtasks.length}</span>` : '';
  el.innerHTML = `
    <div class="sel-cb" onclick="event.stopPropagation();toggleSelect('${item.id}')" title="Zaznacz"></div>
    <span class="num">${num}.</span>
    <span class="drag-handle">⋮⋮</span>
    <button class="btn-priority ${item.priority?'active':''}"
            onclick="event.stopPropagation();togglePriority('${item.id}')"
            title="${item.priority?'Usuń priorytet':'Ustaw priorytet'}">★</button>
    <div class="cb ${cbCls}" data-cbid="${item.id}" title="Kliknij: ☐→✓"></div>
    <div class="item-text" ondblclick="event.stopPropagation();openEdit('${item.id}')">
      ${escHtml(item.text)}${stBadge}${(() => { const ds = getItemDateStr(item); if (!ds) return ''; const dt = parseDate(ds); const diffDays = dt ? Math.round((dt - TODAY)/86400000) : null; let cls = 'date-tag'; if (dt && dt < TODAY) cls += ' overdue'; else if (dt && diffDays === 0) cls += ' today'; else if (dt && diffDays <= 2) cls += ' today'; else if (dt && diffDays <= 7) cls += ' soon'; else if (dt) cls += ' future'; const label = diffDays===0?' dziś':diffDays===1?' jutro':diffDays>0?` za ${diffDays}d`:diffDays!==null?` ${Math.abs(diffDays)}d temu`:''; return ` <span class="${cls}" style="cursor:pointer" onclick="event.stopPropagation();showDateMenu('${item.id}',event)" title="Zmień datę">📅 ${ds}${label}</span>`; })()}
      ${(item.cat || activeProject !== 'general') ? `<span class="badge-cat cat-${item.cat||activeProject}" onclick="event.stopPropagation();showMoveMenu('${item.id}',event)" title="Zmień projekt">${catLabels[item.cat||activeProject]||item.cat||activeProject}</span>` : ''}
    </div>
    <button class="btn-progress-item ${item.inProgress?'is-active':''}" onclick="event.stopPropagation();toggleInProgress('${item.id}')" title="${item.inProgress?'Usuń W trakcie':'Oznacz jako W trakcie'}">⏳</button>
    <button class="btn-note-item ${(hasNote||hasSubtasks)?'has-note':''}" onclick="event.stopPropagation();toggleNote('${item.id}')" title="${noteOpen?'Schowaj':'Rozwiń (notatka/podzadania)'}">📝</button>
    <button class="btn-date-item"   onclick="event.stopPropagation();showDateMenu('${item.id}',event)" title="Dodaj datę">📅</button>
    <button class="btn-edit-item"   onclick="event.stopPropagation();openEdit('${item.id}')"   title="Edytuj">✏</button>
    <button class="btn-delete-item" onclick="event.stopPropagation();deleteItem('${item.id}')" title="Usuń">✕</button>
    <button class="btn-more-item"   onclick="event.stopPropagation();showItemSheet('${item.id}')" title="Więcej">⋯</button>
  `;

  // Expand panel (note + subtasks) — visible when noteOpen
  if (noteOpen) {
    const detail = document.createElement('div');
    detail.className = 'item-detail';

    // Note textarea
    const ta = document.createElement('textarea');
    ta.className = 'note-area';
    ta.placeholder = 'Notatka do zadania…';
    ta.value = noteDisplay;
    ta.rows = 2;
    ta.setAttribute('data-noteid', item.id);
    ta.addEventListener('input', e => {
      const { subtasks: st } = parseItemNote(item);
      const datePrefix = notePart.match(/^📅\s*[\d.]+/) ? notePart.match(/^📅\s*[\d.]+/)[0] : null;
      const newNote = datePrefix ? (datePrefix + (e.target.value ? '\n' + e.target.value : '')) : e.target.value;
      item.note = buildItemNote(newNote, st);
      autoSave();
    });
    ta.addEventListener('click', e => e.stopPropagation());
    ta.addEventListener('keydown', e => {
      if (e.key === 'Escape') { openNotes.delete(item.id); render(); }
    });
    detail.appendChild(ta);

    // Subtasks section
    const stSection = document.createElement('div');
    stSection.className = 'subtask-section';

    if (hasSubtasks) {
      const hdr = document.createElement('div');
      hdr.className = 'subtask-header';
      const pct = subtasks.length ? Math.round(doneSubtasks / subtasks.length * 100) : 0;
      hdr.innerHTML = `<span>Podzadania</span><span class="subtask-count">${doneSubtasks}/${subtasks.length}</span><div class="subtask-progress-bar"><div class="subtask-progress-fill" style="width:${pct}%"></div></div>`;
      stSection.appendChild(hdr);

      subtasks.forEach((st, idx) => {
        const row = document.createElement('div');
        row.className = 'subtask-item';
        row.innerHTML = `
          <div class="st-cb ${st.checked?'st-done':''}" title="${st.checked?'Odznacz':'Zaznacz'}"></div>
          <span class="st-text ${st.checked?'st-done':''}">${escHtml(st.text)}</span>
          <button class="st-del" title="Usuń podzadanie">✕</button>
        `;
        row.querySelector('.st-cb').addEventListener('click', e => { e.stopPropagation(); toggleSubtask(item.id, idx); });
        row.querySelector('.st-del').addEventListener('click', e => { e.stopPropagation(); deleteSubtask(item.id, idx); });
        stSection.appendChild(row);
      });
    }

    // Add subtask input
    const addRow = document.createElement('div');
    addRow.className = 'subtask-add-row';
    const addInput = document.createElement('input');
    addInput.className = 'subtask-add-input';
    addInput.placeholder = '+ dodaj podzadanie…';
    addInput.addEventListener('click', e => e.stopPropagation());
    addInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && addInput.value.trim()) {
        e.preventDefault();
        addSubtask(item.id, addInput.value.trim());
      }
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'subtask-add-btn';
    addBtn.textContent = '+ Dodaj';
    addBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (addInput.value.trim()) addSubtask(item.id, addInput.value.trim());
    });
    addRow.appendChild(addInput);
    addRow.appendChild(addBtn);
    stSection.appendChild(addRow);

    detail.appendChild(stSection);
    el.appendChild(detail);
  }

  el.querySelector('.cb').addEventListener('click', e => {
    e.stopPropagation();
    toggleCheck(item.id);
  });

  el.querySelector('.item-text').addEventListener('click', e => {
    e.stopPropagation();
    toggleNote(item.id);
  });

  el.addEventListener('dragstart', e => {
    dragState.id = item.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', item.id);
    setTimeout(() => el.classList.add('dragging'), 0);
  });

  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x => x.classList.remove('drag-over-top','drag-over-bottom'));
    document.querySelectorAll('.drag-target').forEach(x => x.classList.remove('drag-target'));
    dragState.id = null;
  });

  el.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dragState.id || dragState.id === item.id) return;
    const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x => x.classList.remove('drag-over-top','drag-over-bottom'));
    el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
  });

  el.addEventListener('dragleave', e => {
    if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over-top','drag-over-bottom');
  });

  el.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    el.classList.remove('drag-over-top','drag-over-bottom');
    if (!dragState.id || dragState.id === item.id) return;
    const after = e.clientY >= el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
    const secEl = el.closest('.section');
    const secId = secEl ? secEl.id.replace('sec-','') : item.sec;
    const qEl   = el.closest('.quadrant');
    const qId   = qEl ? qEl.id.replace('quad-','') : null;
    moveItem(dragState.id, secId, qId, item.id, after);
  });

  return el;
}

// ════════════════════════════════════════
//  NOTE
// ════════════════════════════════════════
function toggleNote(id) {
  if (openNotes.has(id)) openNotes.delete(id);
  else openNotes.add(id);
  render();
}

function addSubtask(parentId, text) {
  const item = items.find(i => i.id === parentId);
  if (!item) return;
  pushHistory();
  const { notePart, subtasks } = parseItemNote(item);
  subtasks.push({ id: 'st_' + Date.now(), text, checked: false });
  item.note = buildItemNote(notePart, subtasks);
  render(); autoSave();
}

function toggleSubtask(parentId, idx) {
  const item = items.find(i => i.id === parentId);
  if (!item) return;
  const { notePart, subtasks } = parseItemNote(item);
  if (subtasks[idx]) subtasks[idx].checked = !subtasks[idx].checked;

function importJSON(event) {

  const reader = new FileReader();
  reader.onload = e => {
    try {
      pushHistory();
      const state = JSON.parse(e.target.result);
      if (state.items) items = state.items;
      if (state.sections) state.sections.forEach(ss => {
        const s = sections.find(x => x.id === ss.id);
        if (s) s.collapsed = ss.collapsed;
      });
      if (state.quadsCollapsed)    Object.assign(QUADS_COLLAPSED, state.quadsCollapsed);
      if (state.doneSubsCollapsed) Object.assign(DONE_SUBS_COLLAPSED, state.doneSubsCollapsed);

      });
      render(); autoSave();
      showToast('⬆ Zaimportowano', false);

  };
  reader.readAsText(file);
  event.target.value = '';

function toggleCheck(id) {
  pushHistory();
  const item = items.find(i => i.id === id);
  if (!item) return;

  if (item.checked) {
    // done → todo
    item.checked    = false;
    item.inProgress = false;
    if (item.sec === 'done') {
      item.sec  = item._prevSec  || 'todo';
      item.quad = item._prevQuad || 'q2';
      delete item._prevSec; delete item._prevQuad; delete item.completedAt;
    }
    logAction('↺', `Przywrócono: ${item.text.slice(0,55)}`);
  } else {
    // todo/w-trakcie → done
    item.inProgress  = false;
    item.checked     = true;
    item._prevSec    = item.sec;
    item._prevQuad   = item.quad;
    item.completedAt = new Date().toISOString();
    item.sec  = 'done';
    item.quad = null;
    sections.find(s => s.id === 'done').collapsed = false;
    logAction('✓', `Zrobione: ${item.text.slice(0,55)}`);
  }
  render(); autoSave();
}

function moveItem(srcId, targetSec, targetQuad, anchorId, insertAfter) {
  pushHistory();
  const srcIdx = items.findIndex(i => i.id === srcId);
  if (srcIdx < 0) return;
  const [item] = items.splice(srcIdx, 1);

  item.sec  = targetSec;
  item.quad = targetSec === 'todo' ? (targetQuad || 'q2') : null;

  if (item.checked && targetSec !== 'done') { item.checked = false; delete item.completedAt; }
  if (!item.checked && targetSec === 'done') { item.checked = true; item.completedAt = item.completedAt || new Date().toISOString(); }

  if (!anchorId) {
    let insertAt = items.length;
    for (let i = items.length - 1; i >= 0; i--) {
      if (items[i].sec === targetSec && (targetSec !== 'todo' || items[i].quad === item.quad)) {
        insertAt = i + 1; break;
      }
    }
    if (insertAt === items.length) {
      for (let i = items.length - 1; i >= 0; i--) {
        if (items[i].sec === targetSec) { insertAt = i + 1; break; }
      }
    }
    items.splice(insertAt, 0, item);
  } else {
    const anIdx = items.findIndex(i => i.id === anchorId);
    items.splice(insertAfter ? anIdx + 1 : anIdx, 0, item);
  }
  render(); autoSave();
}

function toggleSection(id, event) {
  if (event && event.target && event.target.closest('.sec-body')) return;
  const s = sections.find(x => x.id === id);

function toggleAll() {

    if (item.checked) {

      item.sec  = item._prevSec  || 'todo';

  render(); autoSave();
}

function saveState(silent = false) {

  if (activeProject === 'general') {
    saveAggregateItems();
  } else {
    const state = {
      _saved: new Date().toISOString(),
      items,
      sections: sections.map(s => ({ id: s.id, collapsed: s.collapsed })),
      quadsCollapsed:    { ...QUADS_COLLAPSED },
      doneSubsCollapsed: { ...DONE_SUBS_COLLAPSED },
